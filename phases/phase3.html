<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homelab – Phase 3</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <style>
    .drag-handle { cursor: grab; color: var(--muted); font-size: 14px; padding: 2px 6px; opacity: 0.25; transition: opacity 0.2s; position: absolute; top: 8px; right: 8px; z-index: 2; user-select: none; line-height: 1; }
    .drag-handle:hover { opacity: 0.7; }
    .drag-handle:active { cursor: grabbing; }
    .card.dragging { opacity: 0.4; transform: scale(0.98); }
    .card.drag-over { border-left: 3px solid var(--accent); background: rgba(79,255,176,0.04); }
    .card[draggable="true"] { position: relative; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="nav"></div>
  <div class="breadcrumb"><a href="../index.html">Dashboard</a><span class="sep">›</span><span id="bc-title">Phase 3</span></div>

  <div id="phase-content"></div>

  <footer>homelab_roadmap · <span>phase_overview</span></footer>
</div>

<script src="../assets/state.js"></script>
<script src="../assets/nav.js"></script>
<script>
(function() {
  'use strict';

  var PHASE_ID = 'phase3';
  var PHASE_NUM = { phase1: 1, phase2: 2, phase3: 3, phase4: 4 };

  function getPhaseSteps(phase) {
    if (phase.steps) return phase.steps;
    if (phase.sections) return phase.sections.reduce(function(acc, s) { return acc.concat(s.steps); }, []);
    return [];
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function init() {
    if (!window.STATE) return;
    var phase = window.STATE.phases.find(function(p) { return p.id === PHASE_ID; });
    if (!phase) return;

    var pNum = PHASE_NUM[phase.id];
    var allSteps = getPhaseSteps(phase).filter(function(s) { return s.status !== 'deferred'; });
    var doneCount = allSteps.filter(function(s) { return s.status === 'done'; }).length;
    var pct = allSteps.length > 0 ? Math.round(doneCount / allSteps.length * 100) : 0;
    var isComplete = allSteps.length > 0 && doneCount === allSteps.length;

    document.title = 'Homelab – Phase ' + pNum + ': ' + phase.title;
    document.getElementById('bc-title').textContent = 'Phase ' + pNum + ' – ' + phase.title;

    var statusBadge = '';
    if (isComplete) {
      statusBadge = '<span style="margin-left:8px;font-family:\'JetBrains Mono\',monospace;font-size:10px;padding:3px 10px;border-radius:4px;background:rgba(34,197,94,0.15);color:var(--done);border:1px solid rgba(34,197,94,0.3)">✓ abgeschlossen</span>';
    } else if (phase.status === 'active') {
      statusBadge = '<span class="current-tag" style="margin-left:8px">← aktiv</span>';
    }

    var completeBanner = isComplete
      ? '<div class="phase-complete-banner">[✓ PHASE ' + pNum + ' COMPLETE] — Alle ' + allSteps.length + ' Steps erledigt</div>'
      : '';

    var hwHtml = (phase.id === 'phase1' && window.STATE.hardware) ? renderHardware() : '';

    var stepsHtml = '';
    if (phase.steps) {
      stepsHtml += '<div class="section-label">Setup-Schritte</div>';
      stepsHtml += renderStepCards(phase.steps, pNum);
    }
    if (phase.sections) {
      for (var i = 0; i < phase.sections.length; i++) {
        stepsHtml += '<div class="section-label">' + phase.sections[i].label + '</div>';
        stepsHtml += renderStepCards(phase.sections[i].steps, pNum, i);
      }
    }

    var deferredSectionHtml = renderDeferredSection(phase, pNum);

    var phaseIdeas = (window.STATE.ideas || []).filter(function(i) { return i.phase_id === phase.id && i.status !== 'deferred'; });
    var ideasHtml = renderIdeasPreview(phase.id, phaseIdeas);
    var notes = phase.notes || '';

    document.getElementById('phase-content').innerHTML =
      '<div class="page-header' + (isComplete ? ' phase-complete' : '') + '" style="position:relative">' +
        (isComplete ? '<div class="phase-complete-particles"><span></span><span></span><span></span><span></span></div>' : '') +
        '<span class="phase-num p' + pNum + '" style="display:inline-block;margin-bottom:10px">PHASE ' + pNum + '</span>' +
        statusBadge +
        '<h1 style="font-family:\'JetBrains Mono\',monospace;font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">' + escHtml(phase.title) + '</h1>' +
        '<div style="font-size:13px;color:var(--muted);font-family:\'JetBrains Mono\',monospace;margin-bottom:16px">' + escHtml(phase.subtitle || '') + '</div>' +
        '<div class="progress-bar" style="margin-bottom:0">' +
          '<span class="progress-label">PHASE FORTSCHRITT</span>' +
          '<div class="progress-track"><div class="progress-fill' + (isComplete ? ' progress-fill-complete' : '') + '" style="width:' + pct + '%"></div></div>' +
          '<span class="progress-pct">' + doneCount + '/' + allSteps.length + '</span>' +
        '</div>' +
        completeBanner +
      '</div>' +
      hwHtml + stepsHtml + deferredSectionHtml + ideasHtml +
      '<div class="section-label" style="margin-top:24px">Phase-Notizen</div>' +
      '<textarea class="phase-notes" id="phase-notes" placeholder="Notizen zu dieser Phase...">' + escHtml(notes) + '</textarea>';

    document.getElementById('phase-notes').addEventListener('blur', function() {
      phase.notes = document.getElementById('phase-notes').value;
      window.saveState();
    });

    // Bind deferred reactivate buttons
    document.querySelectorAll('.deferred-reactivate-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.dataset.id;
        if (btn.dataset.type === 'step') {
          var result = window.findStep(id);
          if (result) { result.step.status = 'todo'; result.step.deferred_reason = ''; window.saveState(); init(); }
        } else {
          var ideas = _getIdeas();
          var idea = ideas.find(function(i) { return i.id === id; });
          if (idea) {
            idea.status = 'idea'; idea.deferred_reason = '';
            _persistIdeas(ideas);
            if (window.STATE && window.STATE.ideas) {
              var si = window.STATE.ideas.find(function(i) { return i.id === id; });
              if (si) { si.status = 'idea'; si.deferred_reason = ''; }
            }
            init();
          }
        }
      });
    });

    bindDragDrop();
  }

  // ===== DRAG & DROP =====
  var dragSrcId = null;
  var dragSrcContainer = null;

  function bindDragDrop() {
    document.querySelectorAll('.cards').forEach(function(container) {
      container.querySelectorAll('.card[draggable="true"]').forEach(function(card) {
        card.addEventListener('dragstart', function(e) {
          if (!e.target.closest('.drag-handle') && e.target.className !== 'drag-handle') {
            e.preventDefault();
            return;
          }
          dragSrcId = card.getAttribute('data-step-id');
          dragSrcContainer = container;
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', dragSrcId);
        });
        card.addEventListener('dragend', function() {
          card.classList.remove('dragging');
          container.querySelectorAll('.card').forEach(function(c) { c.classList.remove('drag-over'); });
          dragSrcId = null;
          dragSrcContainer = null;
        });
        card.addEventListener('dragover', function(e) {
          if (!dragSrcId || dragSrcContainer !== container) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          container.querySelectorAll('.card').forEach(function(c) { c.classList.remove('drag-over'); });
          card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', function() {
          card.classList.remove('drag-over');
        });
        card.addEventListener('drop', function(e) {
          e.preventDefault();
          card.classList.remove('drag-over');
          if (!dragSrcId || dragSrcContainer !== container) return;
          var targetId = card.getAttribute('data-step-id');
          if (dragSrcId === targetId) return;
          var sectionIdx = container.hasAttribute('data-section-idx') ? parseInt(container.getAttribute('data-section-idx')) : null;
          reorderStep(PHASE_ID, dragSrcId, targetId, sectionIdx);
        });
        card.querySelector('.drag-handle').addEventListener('mousedown', function(e) {
          e.stopPropagation();
        });
      });
    });
  }

  function reorderStep(phaseId, draggedId, targetId, sectionIdx) {
    var phase = window.STATE.phases.find(function(p) { return p.id === phaseId; });
    if (!phase) return;
    var steps;
    if (sectionIdx !== null && phase.sections && phase.sections[sectionIdx]) {
      steps = phase.sections[sectionIdx].steps;
    } else if (phase.steps) {
      steps = phase.steps;
    } else {
      return;
    }
    var oldIndex = steps.findIndex(function(s) { return s.id === draggedId; });
    var newIndex = steps.findIndex(function(s) { return s.id === targetId; });
    if (oldIndex === -1 || newIndex === -1 || oldIndex === newIndex) return;
    var moved = steps.splice(oldIndex, 1)[0];
    steps.splice(newIndex, 0, moved);
    window.saveState();
    init();
  }

  function renderHardware() {
    var hw = window.STATE.hardware;
    var rows = Object.keys(hw).map(function(k) {
      var label = k.replace(/_/g,' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
      return '<div class="hw-row"><span class="hw-key">' + escHtml(label) + '</span><span class="hw-val">' + escHtml(String(hw[k])) + '</span></div>';
    }).join('');
    return '<div class="section-label">Hardware</div><div class="hw-box" style="margin-bottom:20px">' + rows + '</div>';
  }

  function renderStepCards(steps, pNum, sectionIdx) {
    var cards = steps.filter(function(s) { return s.status !== 'deferred'; }).map(function(step) {
      var tags = (step.tags || []).map(function(t) { return '<span class="tag">' + escHtml(t) + '</span>'; }).join('');
      return '<a href="../steps/step.html?id=' + encodeURIComponent(step.id) + '" class="card phase' + pNum + '-accent" style="text-decoration:none;display:block" draggable="true" data-step-id="' + escHtml(step.id) + '">' +
        '<span class="drag-handle" title="Verschieben">⠿</span>' +
        '<div class="card-status status-' + step.status + '" title="' + step.status + '"></div>' +
        '<div class="card-title">' + escHtml(step.title) + '</div>' +
        '<div class="card-desc">' + escHtml(step.desc || '') + '</div>' +
        '<div class="tags">' + tags + '</div>' +
      '</a>';
    }).join('');
    var sidx = sectionIdx !== undefined ? ' data-section-idx="' + sectionIdx + '"' : '';
    return '<div class="cards"' + sidx + '>' + cards + '</div>';
  }

  var IDEAS_KEY = 'homelab_ideas_data';
  function _getIdeas() {
    try { var s = localStorage.getItem(IDEAS_KEY); if (s) return JSON.parse(s); } catch(e) {}
    return (window.STATE && window.STATE.ideas) || [];
  }
  function _persistIdeas(ideas) {
    try { localStorage.setItem(IDEAS_KEY, JSON.stringify(ideas)); } catch(e) {}
  }

  function renderDeferredSection(phase, pNum) {
    var allSteps = getPhaseSteps(phase);
    var dSteps = allSteps.filter(function(s) { return s.status === 'deferred'; });
    var allIdeas = _getIdeas();
    var dIdeas = allIdeas.filter(function(i) { return i.phase_id === phase.id && i.status === 'deferred'; });
    var total = dSteps.length + dIdeas.length;
    if (total === 0) return '';
    var h = '<div style="margin-top:24px;margin-bottom:24px">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
      '<span style="font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.04em">ZURÜCKGESTELLT (' + total + ')</span>' +
      '<a href="../deferred.html" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:var(--accent);text-decoration:none">Alle anzeigen →</a>' +
    '</div>';
    function dCard(type, title, desc, reason, tags, id) {
      var tagHtml = (tags || []).map(function(t) { return '<span class="tag">' + escHtml(t) + '</span>'; }).join('');
      var reasonHtml = reason ? '<div style="margin-top:6px;padding-left:12px;font-size:11px;color:var(--muted);font-style:italic">Grund: ' + escHtml(reason) + '</div>' : '';
      return '<div class="deferred-section-card">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
          '<span class="deferred-type-badge">' + type + '</span>' +
          '<span style="font-size:13px;font-weight:600;color:#e8ecf5">' + escHtml(title) + '</span>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-bottom:4px">' + escHtml(desc || '') + '</div>' +
        reasonHtml +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">' +
          '<div class="tags">' + tagHtml + '</div>' +
          '<button class="deferred-reactivate-btn" data-id="' + escHtml(id) + '" data-type="' + (type === 'STEP' ? 'step' : 'idea') + '" ' +
            'style="font-family:\'JetBrains Mono\',monospace;font-size:10px;padding:4px 12px;border-radius:4px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;flex-shrink:0">Reaktivieren</button>' +
        '</div>' +
      '</div>';
    }
    dSteps.forEach(function(s) { h += dCard('STEP', s.title, s.desc, s.deferred_reason, s.tags, s.id); });
    dIdeas.forEach(function(i) { h += dCard('IDEE', i.title, i.desc, i.deferred_reason, i.tags, i.id); });
    h += '</div>';
    return h;
  }

  function renderIdeasPreview(phaseId, ideas) {
    if (ideas.length === 0) return '';
    var items = ideas.map(function(i) {
      return '<li><a href="../ideas.html?highlight=' + encodeURIComponent(i.id) + '" class="idea-row">' +
        '<span class="prio-badge ' + i.prio + '" style="margin:0;flex-shrink:0">' + i.prio + '</span>' +
        escHtml(i.title) +
        '<span class="idea-arrow">→</span>' +
      '</a></li>';
    }).join('');
    return '<div class="section-label" style="margin-top:24px">Ideen zu dieser Phase</div>' +
      '<div class="info-box-sm" style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px">' +
        '<ul class="ideas-preview">' + items + '</ul>' +
        '<a href="../ideas.html?filter=' + phaseId + '" style="font-family:\'JetBrains Mono\',monospace;font-size:11px">Alle Ideen anzeigen →</a>' +
      '</div>';
  }

  window.addEventListener('state-ready', init);
})();
</script>
</body>
</html>
