<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d0f14"/>
  <!-- Subtle grid line -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#2a2f3f" stroke-width="1"/>
  <!-- Terminal prompt: > -->
  <path d="M5 10 L12 16 L5 22" stroke="#4fffb0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor: _ -->
  <rect x="15" y="20" width="8" height="2.2" rx="1" fill="#4fffb0" opacity="0.9"/>
  <!-- Small accent dot top-right -->
  <circle cx="27" cy="6" r="2" fill="#7b61ff" opacity="0.8"/>
</svg>
