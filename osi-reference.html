<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homelab – OSI-Referenz</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>
    .osi-stack { max-width: 420px; }
    .osi-layer {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 2px;
      background: var(--bg2);
      border-left: 3px solid var(--border);
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .osi-layer:hover { background: var(--bg3); }
    .osi-layer.active {
      transform: translateX(4px);
    }
    .osi-layer-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 800;
      color: var(--border2);
      text-align: center;
      transition: color 0.2s;
    }
    .osi-layer.active .osi-layer-num { color: inherit; }
    .osi-layer-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      transition: color 0.2s;
    }
    .osi-layer-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .osi-layer-arrow {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Detail panel */
    .osi-detail {
      background: var(--bg2);
      border-radius: 8px;
      padding: 24px;
      animation: osiFadeIn 0.3s ease;
    }
    @keyframes osiFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .osi-detail-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 4px;
    }
    .osi-detail-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 32px;
      font-weight: 800;
    }
    .osi-detail-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      color: var(--text);
      margin: 0;
    }
    .osi-detail-en {
      font-size: 14px;
      color: var(--muted);
    }
    .osi-detail-desc {
      color: #8892a8;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    /* Sections */
    .osi-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .osi-section-bar {
      width: 8px;
      height: 2px;
      display: inline-block;
    }

    /* Tags */
    .osi-tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      margin: 0 6px 6px 0;
      transition: all 0.2s;
    }
    .osi-tag.highlight {
      border-color: currentColor;
    }
    .osi-tag.device {
      color: #8892a8;
    }
    .osi-tag.security {
      background: rgba(255,181,71,0.08);
      border-color: rgba(255,181,71,0.2);
      color: #fb923c;
    }

    /* Homelab box */
    .osi-homelab {
      padding: 12px;
      border-radius: 0 4px 4px 0;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      border-left: 3px solid;
    }

    /* Deep dive */
    .osi-deep {
      font-size: 13px;
      line-height: 1.8;
      color: #8892a8;
      white-space: pre-wrap;
    }

    /* Comparison table */
    .osi-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 8px;
    }
    .osi-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .osi-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .osi-table td:first-child {
      color: #8892a8;
      font-weight: 600;
    }

    /* Math block */
    .osi-math {
      background: var(--bg);
      padding: 16px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 2;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* Layout grid */
    .osi-grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
      align-items: start;
    }
    .osi-grid.no-detail { grid-template-columns: 1fr; }
    @media (max-width: 900px) {
      .osi-grid { grid-template-columns: 1fr; }
    }

    /* Search */
    .osi-search {
      width: 100%;
      max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      outline: none;
      margin-bottom: 24px;
      transition: border-color 0.15s;
    }
    .osi-search:focus { border-color: var(--border2); }
    .osi-search-results {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-top: 4px;
      max-height: 200px;
      overflow-y: auto;
      max-width: 400px;
      margin-bottom: 16px;
    }
    .osi-search-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }
    .osi-search-item:hover { background: var(--bg); }
    .osi-search-item-proto {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .osi-search-item-layer {
      font-size: 11px;
      color: var(--muted);
    }

    /* Encapsulation demo */
    .encap-wrap {
      background: rgba(13,15,20,0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-top: 16px;
    }
    .encap-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .encap-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .encap-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      transition: all 0.2s;
    }
    .encap-btn.active {
      background: currentColor;
      background: color-mix(in srgb, currentColor 13%, transparent);
    }
    .encap-content {
      background: var(--bg);
      border-radius: 4px;
      padding: 16px;
      transition: all 0.3s;
    }
    .encap-layer-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .encap-desc {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 12px;
    }
    .encap-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text);
      background: var(--bg2);
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }
    .encap-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
    }
    .encap-nav button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .encap-nav button:disabled { color: var(--border); cursor: default; }

    /* Protocol detail expansion */
    .proto-detail-block {
      background: var(--bg2);
      border-top: 2px solid var(--accent);
      border-radius: 0 0 6px 6px;
      padding: 20px;
      margin-top: 12px;
      animation: osiFadeIn 0.3s ease;
    }
    .proto-detail-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .proto-detail-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
    }
    .proto-detail-full {
      font-size: 12px;
      color: var(--muted);
    }
    .proto-detail-summary {
      color: #8892a8;
      font-size: 13px;
      line-height: 1.7;
      margin: 8px 0 16px 0;
    }
    .proto-detail-facts {
      list-style: none;
      padding: 0;
      margin: 8px 0;
    }
    .proto-detail-facts li {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      padding: 4px 0;
      padding-left: 16px;
      position: relative;
      line-height: 1.6;
    }
    .proto-detail-facts li::before {
      content: '\2022';
      position: absolute;
      left: 0;
      color: var(--muted);
    }
    .proto-homelab-callout {
      padding: 12px;
      border-radius: 0 4px 4px 0;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      border-left: 3px solid;
      margin: 8px 0;
    }
    .proto-security-callout {
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.7;
      color: #fb923c;
      background: rgba(255,181,71,0.06);
      border-left: 3px solid #fb923c;
      margin: 8px 0;
    }
    .proto-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }
    .proto-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 3px;
      transition: all 0.15s;
    }
    .proto-link:hover { border-color: var(--accent); background: var(--accent)11; }
    .proto-related-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }
    .proto-related-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
    }
    .proto-related-tag:hover { border-color: var(--accent); background: var(--accent)11; }

    /* Clickable protocol tag */
    .osi-tag.clickable {
      cursor: pointer;
      position: relative;
      padding-right: 22px;
    }
    .osi-tag.clickable::after {
      content: '+';
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      opacity: 0.5;
    }
    .osi-tag.clickable:hover {
      border-color: currentColor;
    }
    .osi-tag.clickable.expanded::after {
      content: '\2212';
    }
  </style>
</head>

<div class="wrap">
  <div id="nav"></div>
  <div class="breadcrumb"><a href="index.html">Dashboard</a><span class="sep">›</span><a href="wiki-preview.html">Wiki</a><span class="sep">›</span><span>OSI-Referenz</span></div>

  <header>
    <div class="header-left">
      <h1>// osi<span>_referenz</span></h1>
      <p style="color:var(--muted);font-size:14px;max-width:700px">Klicke auf eine Schicht für Details. Jede Schicht zeigt Protokolle, Geräte, Security-Aspekte und den Bezug zu deinem Homelab.</p>
    </div>
  </header>

  <!-- Search -->
  <input type="text" class="osi-search" id="osi-search" placeholder="Protokoll suchen... (z.B. TCP, DNS, SSH)">
  <div class="osi-search-results" id="osi-search-results" style="display:none"></div>

  <!-- Main grid -->
  <div class="osi-grid no-detail" id="osi-grid">
    <div>
      <div class="osi-stack" id="osi-stack"></div>
      <!-- Encapsulation toggle -->
      <div style="margin-top:16px">
        <button id="btn-encap" style="width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px 16px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:1px;transition:all 0.2s">▶ Encapsulation Demo</button>
        <div id="encap-container" style="display:none"></div>
      </div>
    </div>
    <div id="osi-detail"></div>
  </div>

  <footer style="margin-top:40px;padding:16px 0;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--border2);text-align:center">
    homelab_roadmap · osi_referenz · Security by Design
  </footer>
</div>

<script src="assets/nav.js"></script>

  // ===== HELPERS =====
  function findProtocolData(tagName) {
    if (!window.PROTOCOLS || !window.PROTOCOLS.protocols) return null;
    var lower = tagName.toLowerCase();
    return window.PROTOCOLS.protocols.find(function(p) {
      return p.name.toLowerCase() === lower || p.id.toLowerCase() === lower;
    }) || null;
  }

  function findProtocolById(id) {
    if (!window.PROTOCOLS || !window.PROTOCOLS.protocols) return null;
    return window.PROTOCOLS.protocols.find(function(p) { return p.id === id; }) || null;
  }

  function findLayerForProtocolId(protocolId) {
    var proto = findProtocolById(protocolId);
    if (!proto) return null;
    // Find the OSI layer that has this protocol name in its list
    for (var i = 0; i < OSI_DATA.length; i++) {
      for (var j = 0; j < OSI_DATA[i].protocols.length; j++) {
        if (OSI_DATA[i].protocols[j].toLowerCase() === proto.name.toLowerCase()) {
          return OSI_DATA[i];
        }
      }
    }
    // Fallback: use layers[] from protocol data
    if (proto.layers && proto.layers.length > 0) {
      return OSI_DATA.find(function(l) { return l.layer === proto.layers[0]; }) || null;
    }
    return null;
  }

  // ===== RENDER STACK =====
  function renderStack() {
    var html = '';
    OSI_DATA.forEach(function(l) {
      var isActive = activeLayer === l.layer;
      var bgStyle = isActive ? 'background:' + l.color + '15;' : '';
      var borderStyle = 'border-left-color:' + (isActive ? l.color : 'var(--border)') + ';';
      var transformStyle = isActive ? 'transform:translateX(4px);' : '';
      html += '<div class="osi-layer' + (isActive ? ' active' : '') + '" data-layer="' + l.layer + '" style="' + bgStyle + borderStyle + transformStyle + '">';
      html += '<div class="osi-layer-num" style="color:' + (isActive ? l.color : '') + '">' + l.layer + '</div>';
      html += '<div><div class="osi-layer-name" style="color:' + (isActive ? l.color : '') + '">' + l.name + '</div>';
      html += '<div class="osi-layer-sub">' + l.nameEn + ' \u00b7 PDU: ' + l.pdu + '</div></div>';
      html += '<div class="osi-layer-arrow">' + (isActive ? '\u25bc' : '\u25b6') + '</div>';
      html += '</div>';
    });
    document.getElementById('osi-stack').innerHTML = html;
  }

  // ===== RENDER DETAIL =====
  function renderDetail() {
    var container = document.getElementById('osi-detail');
    var grid = document.getElementById('osi-grid');
    if (activeLayer === null) {
      container.innerHTML = '';
      grid.classList.add('no-detail');
      return;
    }
    grid.classList.remove('no-detail');
    var l = OSI_DATA.find(function(d) { return d.layer === activeLayer; });
    if (!l) return;

    var html = '<div class="osi-detail" style="border-top:3px solid ' + l.color + ';border-color:' + l.color + '33;border-top-color:' + l.color + '">';
    // Header
    html += '<div class="osi-detail-header">';
    html += '<span class="osi-detail-num" style="color:' + l.color + '">' + l.layer + '</span>';
    html += '<h2 class="osi-detail-title">' + l.name + '</h2>';
    html += '<span class="osi-detail-en">' + l.nameEn + '</span>';
    html += '</div>';
    html += '<p class="osi-detail-desc">' + esc(l.description) + '</p>';

    // Protokolle
    html += section('PROTOKOLLE', l.color);
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px" id="proto-tags">';
    l.protocols.forEach(function(p) {
      var hl = highlightProtocol === p;
      var protoData = findProtocolData(p);
      var isClickable = !!protoData;
      var isExpanded = isClickable && expandedProtocol === protoData.id;
      var cls = 'osi-tag' + (hl ? ' highlight' : '') + (isClickable ? ' clickable' : '') + (isExpanded ? ' expanded' : '');
      var style = hl ? 'background:' + l.color + '33;border-color:' + l.color + ';color:' + l.color : (isClickable ? 'color:' + l.color : '');
      html += '<span class="' + cls + '" data-proto-name="' + esc(p) + '"' + (protoData ? ' data-proto-id="' + protoData.id + '"' : '') + ' style="' + style + '">' + esc(p) + '</span>';
    });
    html += '</div>';
    // Protocol detail expansion
    html += '<div id="proto-expansion"></div>';

    // Geräte
    if (l.devices.length > 0) {
      html += section('GER\u00c4TE', l.color);
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
      l.devices.forEach(function(d) {
        html += '<span class="osi-tag device">' + esc(d) + '</span>';
      });
      html += '</div>';
    }

    // Security
    html += section('SECURITY', l.color);
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    l.security.forEach(function(s) {
      html += '<span class="osi-tag security">' + esc(s) + '</span>';
    });
    html += '</div>';

    // Homelab
    html += section('DEIN HOMELAB', l.color);
    html += '<div class="osi-homelab" style="background:' + l.color + '08;border-left-color:' + l.color + '">' + esc(l.homelab) + '</div>';

    // Deep Dive
    html += section('DEEP DIVE', l.color);
    html += '<p class="osi-deep">' + esc(l.deepDive) + '</p>';

    // Comparison table
    if (l.comparison) {
      html += section(l.comparison.title, l.color);
      html += '<div style="overflow-x:auto"><table class="osi-table"><thead><tr>';
      l.comparison.headers.forEach(function(h) {
        html += '<th style="color:' + l.color + ';border-bottom:2px solid ' + l.color + '44">' + esc(h) + '</th>';
      });
      html += '</tr></thead><tbody>';
      l.comparison.rows.forEach(function(row) {
        html += '<tr>';
        row.forEach(function(cell) {
          html += '<td>' + esc(cell) + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    }

    // Math
    if (l.math) {
      html += section(l.math.title, l.color);
      html += '<div class="osi-math">' + esc(l.math.content) + '</div>';
    }

    html += '</div>';
    container.innerHTML = html;
    container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function section(title, color) {
    return '<div class="osi-section-title"><span class="osi-section-bar" style="background:' + color + '"></span>' + title + '</div>';
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ===== PROTOCOL DETAIL EXPANSION =====
  function renderProtoExpansion() {
    var container = document.getElementById('proto-expansion');
    if (!container) return;
    if (!expandedProtocol) { container.innerHTML = ''; return; }
    var proto = findProtocolById(expandedProtocol);
    if (!proto) { container.innerHTML = ''; return; }
    var l = OSI_DATA.find(function(d) { return d.layer === activeLayer; });
    var color = l ? l.color : 'var(--accent)';

    var html = '<div class="proto-detail-block" style="border-top-color:' + color + '">';
    // Header
    html += '<div class="proto-detail-header">';
    html += '<span class="proto-detail-name" style="color:' + color + '">' + esc(proto.name) + '</span>';
    html += '<span class="proto-detail-full">' + esc(proto.fullName || '') + '</span>';
    html += '</div>';
    html += '<div class="proto-detail-summary">' + esc(proto.summary || '') + '</div>';

    // Key Facts
    if (proto.keyFacts && proto.keyFacts.length > 0) {
      html += section('KEY FACTS', color);
      html += '<ul class="proto-detail-facts">';
      proto.keyFacts.forEach(function(f) { html += '<li>' + esc(f) + '</li>'; });
      html += '</ul>';
    }

    // Use Cases
    if (proto.useCases && proto.useCases.length > 0) {
      html += section('USE CASES', color);
      html += '<div style="font-size:13px;color:var(--text)">' + proto.useCases.map(esc).join(' \u00b7 ') + '</div>';
    }

    // Homelab
    if (proto.homelab) {
      html += section('DEIN HOMELAB', color);
      html += '<div class="proto-homelab-callout" style="background:' + color + '08;border-left-color:' + color + '">' + esc(proto.homelab) + '</div>';
    }

    // Security
    if (proto.securityRelevance) {
      html += section('SECURITY', color);
      html += '<div class="proto-security-callout">\u26a0 ' + esc(proto.securityRelevance) + '</div>';
    }

    // Links
    if (proto.links && proto.links.length > 0) {
      html += section('LINKS', color);
      html += '<div class="proto-links">';
      proto.links.forEach(function(link) {
        html += '<a href="' + esc(link.url) + '" target="_blank" rel="noopener" class="proto-link">\u2197 ' + esc(link.title) + '</a>';
      });
      html += '</div>';
    }

    // Related protocols
    if (proto.relatedProtocols && proto.relatedProtocols.length > 0) {
      html += section('VERWANDT', color);
      html += '<div class="proto-related-tags">';
      proto.relatedProtocols.forEach(function(relId) {
        var relProto = findProtocolById(relId);
        var label = relProto ? relProto.name : relId;
        html += '<span class="proto-related-tag" data-related-id="' + esc(relId) + '">' + esc(label) + '</span>';
      });
      html += '</div>';
    }

    html += '</div>';
    container.innerHTML = html;

    // Bind related tag clicks
    container.querySelectorAll('.proto-related-tag').forEach(function(el) {
      el.addEventListener('click', function() {
        var relId = this.getAttribute('data-related-id');
        var relProto = findProtocolById(relId);
        if (!relProto) return;
        var targetLayer = findLayerForProtocolId(relId);
        if (targetLayer) {
          activeLayer = targetLayer.layer;
          highlightProtocol = relProto.name;
          expandedProtocol = relId;
          renderStack();
          renderDetail();
          renderProtoExpansion();
        }
      });
    });
  }

  // ===== ENCAPSULATION DEMO =====
  function renderEncap() {
    if (!encapVisible) { document.getElementById('encap-container').style.display = 'none'; return; }
    document.getElementById('encap-container').style.display = '';
    var s = ENCAP_STEPS[encapStep];
    var html = '<div class="encap-wrap">';
    html += '<div class="encap-title">Encapsulation — Schicht f\u00fcr Schicht</div>';
    html += '<div class="encap-btns">';
    ENCAP_STEPS.forEach(function(st, i) {
      var active = i === encapStep;
      var style = active ? 'border-color:' + st.color + ';color:' + st.color + ';background:' + st.color + '22' : '';
      html += '<button class="encap-btn' + (active ? ' active' : '') + '" data-encap="' + i + '" style="' + style + '">' + st.label + '</button>';
    });
    html += '</div>';
    html += '<div class="encap-content" style="border:1px solid ' + s.color + '44;border-left:3px solid ' + s.color + '">';
    html += '<div class="encap-layer-label" style="color:' + s.color + '">' + esc(s.layer) + '</div>';
    html += '<div class="encap-desc">' + esc(s.desc) + '</div>';
    html += '<div class="encap-code">' + esc(s.content) + '</div>';
    html += '</div>';
    html += '<div class="encap-nav">';
    html += '<button id="encap-prev"' + (encapStep === 0 ? ' disabled' : '') + '>\u2190 Hoch (De-Encap)</button>';
    html += '<button id="encap-next"' + (encapStep === ENCAP_STEPS.length - 1 ? ' disabled' : '') + '>Runter (Encap) \u2192</button>';
    html += '</div>';
    html += '</div>';
    document.getElementById('encap-container').innerHTML = html;
  }

  // ===== SEARCH =====
  function doSearch(term) {
    var results = document.getElementById('osi-search-results');
    if (term.length < 2) { results.style.display = 'none'; return; }
    var matches = [];
    OSI_DATA.forEach(function(l) {
      l.protocols.forEach(function(p) {
        if (p.toLowerCase().indexOf(term.toLowerCase()) !== -1) {
          matches.push({ protocol: p, layer: l });
        }
      });
    });
    if (matches.length === 0) { results.style.display = 'none'; return; }
    results.style.display = '';
    var html = '';
    matches.forEach(function(m, i) {
      html += '<div class="osi-search-item" data-idx="' + i + '">';
      html += '<span class="osi-search-item-proto" style="color:' + m.layer.color + '">' + esc(m.protocol) + '</span>';
      html += '<span class="osi-search-item-layer">Layer ' + m.layer.layer + ' \u2014 ' + m.layer.name + '</span>';
      html += '</div>';
    });
    results.innerHTML = html;
    // Bind clicks
    results.querySelectorAll('.osi-search-item').forEach(function(el) {
      el.addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var match = matches[idx];
        activeLayer = match.layer.layer;
        highlightProtocol = match.protocol;
        document.getElementById('osi-search').value = '';
        results.style.display = 'none';
        renderStack();
        renderDetail();
      });
    });
  }

  // ===== EVENT BINDING =====
  function bind() {
    // Stack clicks
    document.getElementById('osi-stack').addEventListener('click', function(e) {
      var layerEl = e.target.closest('.osi-layer');
      if (!layerEl) return;
      var num = parseInt(layerEl.getAttribute('data-layer'));
      activeLayer = activeLayer === num ? null : num;
      highlightProtocol = null;
      expandedProtocol = null;
      renderStack();
      renderDetail();
    });

    // Protocol tag clicks (delegated on detail panel)
    document.getElementById('osi-detail').addEventListener('click', function(e) {
      var tag = e.target.closest('.osi-tag.clickable');
      if (!tag) return;
      var protoId = tag.getAttribute('data-proto-id');
      if (!protoId) return;
      // Toggle: same tag closes, different tag opens
      if (expandedProtocol === protoId) {
        expandedProtocol = null;
      } else {
        expandedProtocol = protoId;
        highlightProtocol = tag.getAttribute('data-proto-name');
      }
      renderDetail();
      renderProtoExpansion();
    });

    // Search
    document.getElementById('osi-search').addEventListener('input', function() {
      highlightProtocol = null;
      doSearch(this.value);
    });

    // Encapsulation toggle
    document.getElementById('btn-encap').addEventListener('click', function() {
      encapVisible = !encapVisible;
      this.textContent = (encapVisible ? '\u25bc' : '\u25b6') + ' Encapsulation Demo';
      this.style.borderColor = encapVisible ? 'var(--accent)' : 'var(--border)';
      this.style.color = encapVisible ? 'var(--accent)' : 'var(--muted)';
      renderEncap();
    });

    // Encapsulation nav (delegated)
    document.getElementById('encap-container').addEventListener('click', function(e) {
      if (e.target.id === 'encap-prev' && encapStep > 0) { encapStep--; renderEncap(); }
      else if (e.target.id === 'encap-next' && encapStep < ENCAP_STEPS.length - 1) { encapStep++; renderEncap(); }
      else if (e.target.classList.contains('encap-btn')) {
        encapStep = parseInt(e.target.getAttribute('data-encap'));
        renderEncap();
      }
    });
  }

  // ===== INIT =====
  function initPage() {
    renderStack();
    bind();
  }

  // Wait for protocols data to be ready
  if (window.PROTOCOLS) {
    initPage();
  } else {
    window.addEventListener('protocols-ready', initPage);
  }
})();
</script>
</body>
</html>
