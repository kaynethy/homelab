<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homelab – Ideen</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>
    /* === COMMAND CENTER LAYOUT === */
    .cmd-layout {
      display: flex;
      align-items: flex-start;
      gap: 0;
      min-height: calc(100vh - 260px);
    }

    /* === SIDEBAR === */
    .cmd-sidebar {
      width: 200px;
      min-width: 200px;
      position: sticky;
      top: 80px;
      height: calc(100vh - 100px);
      padding: 16px 12px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }
    /* Sidebar fixed sections (everything above tags) */
    .sb-brand, .sb-new, .sb-section, .sb-item, .sb-hide-done {
      flex-shrink: 0;
    }

    /* Sidebar scrollable tags container */
    .sb-tags-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .sb-tags-scroll::-webkit-scrollbar { width: 4px; }
    .sb-tags-scroll::-webkit-scrollbar-track { background: transparent; }
    .sb-tags-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sb-brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .sb-brand b { color: var(--accent); font-weight: 700; }
    .sb-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-top: 4px;
    }
    .sb-section {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 0 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 150ms, color 150ms;
      width: 100%;
      text-align: left;
    }
    .sb-item:hover { background: var(--bg3); }
    .sb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sb-label { flex: 1; }
    .sb-num {
      font-size: 10px;
      opacity: 0.5;
    }
    /* Phase dot colors */
    .sb-item[data-phase="all"] .sb-dot     { background: var(--accent); }
    .sb-item[data-phase="phase1"] .sb-dot  { background: var(--phase1); }
    .sb-item[data-phase="phase2"] .sb-dot  { background: var(--phase2); }
    .sb-item[data-phase="phase3"] .sb-dot  { background: var(--phase3); }
    .sb-item[data-phase="phase4"] .sb-dot  { background: var(--phase4); }
    .sb-item[data-phase="open"] .sb-dot    { background: var(--muted); }
    /* Prio dot colors */
    .sb-item[data-prio="high"] .sb-dot     { background: var(--phase4); }
    .sb-item[data-prio="medium"] .sb-dot   { background: var(--phase2); }
    .sb-item[data-prio="low"] .sb-dot      { background: var(--muted); }
    /* Active sidebar states */
    .sb-item.active { color: #fff; font-weight: 600; }
    .sb-item[data-phase="all"].active    { background: var(--accent); color: var(--bg); }
    .sb-item[data-phase="phase1"].active { background: var(--phase1); color: var(--bg); }
    .sb-item[data-phase="phase2"].active { background: var(--phase2); color: var(--bg); }
    .sb-item[data-phase="phase3"].active { background: var(--phase3); color: var(--bg); }
    .sb-item[data-phase="phase4"].active { background: var(--phase4); color: var(--bg); }
    .sb-item[data-phase="open"].active   { background: var(--muted); color: var(--bg); }
    .sb-item[data-prio="high"].active    { background: var(--phase4); color: var(--bg); }
    .sb-item[data-prio="medium"].active  { background: var(--phase2); color: var(--bg); }
    .sb-item[data-prio="low"].active     { background: var(--muted); color: var(--bg); }
    .sb-item.active .sb-dot { background: currentColor; }
    .sb-item.active .sb-num { opacity: 0.8; }

    .sb-new {
      margin-top: 12px;
      padding-top: 16px;
    }
    .sb-new-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(79,255,176,0.08);
      border: 1px solid rgba(79,255,176,0.25);
      cursor: pointer;
      transition: background 150ms;
    }
    .sb-new-btn:hover { background: rgba(79,255,176,0.18); }

    /* === MAIN CONTENT === */
    .cmd-main {
      flex: 1;
      min-width: 0;
      padding: 20px 0 20px 24px;
    }
    .cmd-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .cmd-header-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }
    .cmd-header-title b { color: #fff; font-weight: 600; }
    .cmd-header-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .cmd-header-stat b { font-weight: 600; }

    /* === CARD GRID === */
    .cmd-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      transition: opacity 150ms ease;
    }

    /* === CARD === */
    .cmd-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 150ms, border-color 150ms, box-shadow 150ms;
    }
    .cmd-card.prio-high   { border-left: 3px solid var(--phase4); }
    .cmd-card.prio-medium { border-left: 3px solid var(--phase2); }
    .cmd-card.prio-low    { border-left: 3px solid var(--muted); }
    .cmd-card:not(.expanded):hover {
      transform: scale(1.02);
      border-color: var(--border2);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .cmd-card.expanded {
      grid-column: 1 / -1;
      border-color: var(--border2);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    /* Card summary (always visible) */
    .card-summary {
      padding: 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cmd-card.expanded .card-summary { cursor: default; }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }
    .card-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--muted);
    }
    .card-tag.net { color: var(--phase2); border-color: rgba(77,184,255,0.3); background: rgba(77,184,255,0.06); }
    .card-tag.sec { color: var(--phase4); border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.06); }
    .card-tag.svc { color: var(--phase3); border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.06); }
    .card-tag.hw  { color: var(--text); border-color: var(--border2); background: var(--bg3); }

    .card-close {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 24px; height: 24px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 150ms, border-color 150ms;
    }
    .card-close:hover { color: var(--text); border-color: var(--border2); }
    .cmd-card.expanded .card-close { display: flex; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }
    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      line-clamp: 1;
      -webkit-box-orient: vertical;
    }
    .cmd-card.expanded .card-desc { display: none; }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: auto;
    }
    .card-prio-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-prio-dot.high   { background: var(--phase4); }
    .card-prio-dot.medium { background: var(--phase2); }
    .card-prio-dot.low    { background: var(--muted); }
    .card-phase-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .card-phase-pill.p1 { background: rgba(0,212,170,0.15); color: var(--phase1); }
    .card-phase-pill.p2 { background: rgba(77,184,255,0.15); color: var(--phase2); }
    .card-phase-pill.p3 { background: rgba(167,139,250,0.15); color: var(--phase3); }
    .card-phase-pill.p4 { background: rgba(251,146,60,0.15); color: var(--phase4); }
    .card-phase-pill.open { background: rgba(90,98,120,0.2); color: var(--muted); }
    .card-footer-spacer { flex: 1; }
    .card-comments-badge { opacity: 0.6; }

    /* Card details (accordion) */
    .card-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 250ms ease;
    }
    .cmd-card.expanded .card-details {
      overflow: visible;
    }
    .card-details-inner {
      padding: 0 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-full-desc {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      padding: 10px 12px;
      background: var(--bg3);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .card-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .card-link a {
      color: var(--accent);
      text-decoration: none;
    }
    .card-link a:hover { text-decoration: underline; }
    .card-comments-section {
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .card-comments-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .card-comment {
      font-size: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
    }
    .card-comment-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .card-comment-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .card-comment-actions {
      display: flex;
      gap: 4px;
    }
    .card-comment-actions button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .card-comment-actions button:hover { color: var(--text); background: var(--bg); }
    .card-comment-text {
      color: var(--text);
      line-height: 1.5;
    }
    .card-no-comments {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0;
    }
    .card-comment-form {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 4px;
    }
    .card-comment-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 150ms;
    }
    .card-comment-form input:focus { border-color: var(--accent); }
    .card-comment-form button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity 150ms;
    }
    .card-comment-form button:hover { opacity: 0.85; }
    .card-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .card-status-row label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .card-status-row select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--text);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      cursor: pointer;
    }
    .card-status-row select:focus { border-color: var(--accent); }

    /* Empty state */
    .cmd-empty {
      grid-column: 1/-1;
      padding: 48px;
      text-align: center;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* Phase group divider (grouped "Alle" view) */
    .phase-group-divider {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 0 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .phase-group-divider:first-child { padding-top: 4px; }
    .phase-group-line {
      height: 1px;
      flex: 1;
    }
    .phase-group-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .phase-group-count {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Drag & Drop */
    .cmd-card[draggable="true"] { cursor: grab; }
    .cmd-card[draggable="true"]:active { cursor: grabbing; }
    .cmd-card.dragging {
      opacity: 0.5;
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 10;
      cursor: grabbing;
    }
    .phase-group-divider[data-phase] {
      transition: background 150ms, padding 150ms;
      border-radius: 6px;
    }
    .phase-group-divider.drag-over {
      background: rgba(79,255,176,0.06);
      padding-top: 22px !important;
      padding-bottom: 10px;
    }
    .phase-group-divider.drag-over .phase-group-line {
      opacity: 1 !important;
      height: 2px;
      box-shadow: 0 0 10px 1px;
      transition: all 150ms;
    }
    .cmd-card.drop-flash {
      animation: dropFlash 400ms ease;
    }
    @keyframes dropFlash {
      0%   { box-shadow: 0 0 0 3px rgba(34,197,94,0.7), 0 0 16px rgba(34,197,94,0.3); }
      100% { box-shadow: none; }
    }

    /* Assign row (phase/step dropdowns on card back) */
    .card-assign-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .card-assign-row label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .card-assign-row select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--text);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      cursor: pointer;
      max-width: 220px;
    }
    .card-assign-row select:focus { border-color: var(--accent); }

    /* Editable tags on card back */
    .card-tags-edit {
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-tags-edit-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-tags-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    .card-tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
    }
    .card-tag-chip button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 10px;
      padding: 0 1px;
      line-height: 1;
    }
    .card-tag-chip button:hover { color: var(--phase4); }
    .card-tag-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--text);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      width: 140px;
    }
    .card-tag-input:focus { border-color: var(--accent); }

    /* Tag Autocomplete */
    .tag-ac-wrap { position: relative; display: inline-block; }
    .tag-ac-drop {
      position: absolute;
      left: 0; top: 100%;
      min-width: 200px;
      max-height: 180px;
      overflow-y: auto;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      z-index: 300;
      display: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .tag-ac-drop.open { display: block; }
    .tag-ac-opt {
      padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text);
      cursor: pointer;
      transition: background 100ms;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tag-ac-opt:hover, .tag-ac-opt.hl { background: rgba(79,255,176,0.1); }
    .tag-ac-opt.create { color: var(--accent); font-style: italic; }

    /* Panel tag chips */
    .sp-tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }
    .sp-tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
    }
    .sp-tag-chip button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 10px;
      padding: 0 1px;
      line-height: 1;
    }
    .sp-tag-chip button:hover { color: var(--phase4); }

    /* Sidebar tag filter chips */
    .sb-tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 2px;
    }
    .sb-tag-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 4px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .sb-tag-chip:hover { color: var(--text); border-color: var(--border2); }
    .sb-tag-chip.active {
      background: rgba(79,255,176,0.15);
      color: var(--accent);
      border-color: rgba(79,255,176,0.4);
    }

    /* === SLIDE-IN PANEL === */
    .slide-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
    }
    .slide-overlay.open { opacity: 1; pointer-events: auto; }
    .slide-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      height: 100vh;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 250ms ease;
      z-index: 200;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .slide-panel.open { transform: translateX(0); }
    .sp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sp-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    .sp-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 150ms, border-color 150ms;
    }
    .sp-close:hover { color: var(--text); border-color: var(--border2); }
    .sp-form { display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .sp-group { display: flex; flex-direction: column; gap: 5px; }
    .sp-group label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .sp-group input,
    .sp-group textarea,
    .sp-group select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 150ms;
    }
    .sp-group input:focus,
    .sp-group textarea:focus,
    .sp-group select:focus { border-color: var(--accent); }
    .sp-group textarea { resize: vertical; min-height: 80px; }
    .sp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sp-actions { display: flex; gap: 8px; margin-top: auto; padding-top: 12px; }
    .sp-btn-submit {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: rgba(79,255,176,0.12);
      color: var(--accent);
      cursor: pointer;
      transition: background 150ms;
    }
    .sp-btn-submit:hover { background: rgba(79,255,176,0.22); }
    .sp-btn-cancel {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 10px 16px;
      border-radius: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: color 150ms;
    }
    .sp-btn-cancel:hover { color: var(--text); }

    /* === DONE CARD STYLING === */
    .cmd-card.is-done {
      opacity: 0.55;
      border-color: var(--border) !important;
      border-left-color: var(--done) !important;
    }
    .cmd-card.is-done .card-title {
      text-decoration: line-through;
      color: var(--muted);
    }
    .cmd-card.is-done .card-desc { color: var(--border2); }
    .done-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(34,197,94,0.15);
      color: var(--done);
      letter-spacing: 0.04em;
    }

    /* Card action buttons (delete / done) */
    .card-actions-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 12px;
      margin-top: 4px;
      border-top: 1px solid var(--border);
    }
    .card-actions-row .spacer { flex: 1; }
    .card-btn-done {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid rgba(34,197,94,0.4);
      background: rgba(34,197,94,0.08);
      color: var(--done);
      cursor: pointer;
      transition: background 150ms;
    }
    .card-btn-done:hover { background: rgba(34,197,94,0.18); }
    .card-btn-delete {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid rgba(239,68,68,0.35);
      background: rgba(239,68,68,0.06);
      color: #ef4444;
      cursor: pointer;
      transition: background 150ms;
    }
    .card-btn-delete:hover { background: rgba(239,68,68,0.16); }

    /* Realize button */
    .card-btn-realize {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid rgba(79,255,176,0.4);
      background: rgba(79,255,176,0.08);
      color: var(--accent);
      cursor: pointer;
      transition: background 150ms;
    }
    .card-btn-realize:hover { background: rgba(79,255,176,0.18); }

    /* Realize inline form */
    .realize-form {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid rgba(79,255,176,0.3);
      border-radius: 6px;
      background: rgba(79,255,176,0.04);
    }
    .realize-form.open { display: flex; }
    .realize-form label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .realize-form input,
    .realize-form select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
    }
    .realize-form input:focus,
    .realize-form select:focus { border-color: var(--accent); }
    .realize-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; }
    .realize-row .realize-field { display: flex; flex-direction: column; gap: 3px; }
    .realize-actions { display: flex; gap: 8px; margin-top: 4px; }
    .realize-confirm {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--accent);
      background: rgba(79,255,176,0.12);
      color: var(--accent);
      cursor: pointer;
    }
    .realize-confirm:hover { background: rgba(79,255,176,0.22); }
    .realize-cancel {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      cursor: pointer;
    }
    .realize-feedback {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--done);
      display: none;
      padding: 6px 0;
    }

    /* Export button in header */
    .cmd-header-export {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      cursor: pointer;
      transition: all 150ms;
      white-space: nowrap;
    }
    .cmd-header-export:hover { border-color: var(--border2); color: var(--text); }

    /* Hide-done filter chip */
    .sb-hide-done {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      transition: background 120ms;
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
    }
    .sb-hide-done:hover { background: var(--bg3); }
    .sb-hide-done .cb {
      width: 14px; height: 14px;
      border: 1px solid var(--border2);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      transition: all 120ms;
    }
    .sb-hide-done.active .cb {
      background: var(--done);
      border-color: var(--done);
      color: var(--bg);
    }

    /* === FAB (mobile only) === */
    .fab-mobile {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg);
      font-size: 22px;
      font-weight: 300;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(79,255,176,0.3);
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: transform 150ms;
    }
    .fab-mobile:hover { transform: scale(1.08); }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .cmd-layout { flex-direction: column; }
      .cmd-sidebar {
        width: 100%;
        min-width: 100%;
        height: auto;
        max-height: none;
        position: relative;
        top: auto;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 10px 12px;
        gap: 6px;
        align-items: center;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .cmd-sidebar::-webkit-scrollbar { display: none; }
      .sb-brand, .sb-section, .sb-new { display: none; }
      .sb-item {
        padding: 6px 10px;
        white-space: nowrap;
        flex-shrink: 0;
        font-size: 11px;
      }
      .cmd-main { padding: 16px 0 0; }
      .cmd-grid { grid-template-columns: 1fr; }
      .slide-panel { width: 100%; }
      .fab-mobile { display: flex; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="nav"></div>
  <div class="breadcrumb"><a href="index.html">Dashboard</a><span class="sep">›</span><span>Ideen</span></div>

  <div class="cmd-header" id="cmd-header"></div>

  <div class="cmd-layout">
    <!-- Sidebar -->
    <aside class="cmd-sidebar" id="sidebar"></aside>

    <!-- Main content area -->
    <main class="cmd-main">
      <div class="cmd-grid" id="cmd-grid"></div>
    </main>
  </div>

  <footer>homelab_roadmap · <span>ideen_board</span></footer>
</div>

<!-- Slide-in overlay -->
<div class="slide-overlay" id="slide-overlay"></div>

<!-- Slide-in new idea panel -->
<div class="slide-panel" id="slide-panel">
  <div class="sp-header">
    <span class="sp-title">+ Neue Idee</span>
    <button class="sp-close" id="sp-close">✕</button>
  </div>
  <div class="sp-form" id="sp-form">
    <div class="sp-group">
      <label>Titel</label>
      <input type="text" id="idea-title" placeholder="Ideen-Titel...">
    </div>
    <div class="sp-group">
      <label>Beschreibung</label>
      <textarea id="idea-desc" placeholder="Kurze Beschreibung..."></textarea>
    </div>
    <div class="sp-row">
      <div class="sp-group">
        <label>Phase</label>
        <select id="idea-phase">
          <option value="">— keine —</option>
          <option value="phase1">Phase 1 – Fundament</option>
          <option value="phase2">Phase 2 – Netz</option>
          <option value="phase3">Phase 3 – Dienste</option>
          <option value="phase4">Phase 4 – Security</option>
        </select>
      </div>
      <div class="sp-group">
        <label>Priorität</label>
        <select id="idea-prio">
          <option value="high">⚡ High</option>
          <option value="medium" selected>● Medium</option>
          <option value="low">· Low</option>
        </select>
      </div>
    </div>
    <div class="sp-group">
      <label>Tags</label>
      <div class="sp-tag-chips" id="sp-tag-chips"></div>
      <div class="tag-ac-wrap">
        <input type="text" id="idea-tags" placeholder="Tag eingeben..." autocomplete="off">
        <div class="tag-ac-drop" id="sp-tag-drop"></div>
      </div>
    </div>
    <div class="sp-actions">
      <button class="sp-btn-submit" id="sp-submit">Hinzufügen</button>
      <button class="sp-btn-cancel" id="sp-cancel">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Mobile FAB -->
<button class="fab-mobile" id="fab-mobile" title="Neue Idee">+</button>

<script src="assets/state.js"></script>
<script src="assets/nav.js"></script>
<script>
(function() {
  'use strict';

  var activePhase = 'all';
  var activePrio  = 'all';
  var activeTags  = [];
  var hideDone    = false;
  var expandedId  = null;
  var IDEAS_KEY   = 'homelab_ideas_data';

  // ---- TAG CLASSIFICATION ----
  var NET_TAGS = ['vpn','dns','netzwerk','network','vlan','firewall','reverse proxy','ddns','wireguard','ip','subnet','routing','proxy','ingress','nginx','traefik','dhcp','syslog','ntp','wlan','wifi','tailscale','ikev2','ipsec','strongswan','802.1x'];
  var SEC_TAGS = ['security','2fa','sso','auth','tls','ssl','certificate','ca','ids','ips','pentest','fail2ban','vault','bitwarden','vaultwarden','totp','tacacs','tacacs+','radius','freeradius','aaa','iam','rbac','permissions','hardening','keys','ssh'];
  var SVC_TAGS = ['docker','container','ansible','git','gitea','wiki','dokuwiki','mail','n8n','chat','matrix','monitoring','grafana','loki','uptime','kuma','terraform','iac','automation','awx','semaphore','oxidized','privatebin','homeassistant','smarthome','web','blog','webserver'];
  var HW_TAGS  = ['hardware','rack','mini-pc','n100','server','proxmox','pbs'];

  function tagClass(tag) {
    var t = tag.toLowerCase();
    if (NET_TAGS.some(function(k) { return t.includes(k); })) return 'net';
    if (SEC_TAGS.some(function(k) { return t.includes(k); })) return 'sec';
    if (SVC_TAGS.some(function(k) { return t.includes(k); })) return 'svc';
    if (HW_TAGS.some(function(k) { return t.includes(k); }))  return 'hw';
    return '';
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var PHASE_LABELS = {
    phase1: 'Phase 1 – Fundament',
    phase2: 'Phase 2 – Netz',
    phase3: 'Phase 3 – Dienste',
    phase4: 'Phase 4 – Security'
  };
  var PHASE_SHORT = {
    phase1: 'P1', phase2: 'P2', phase3: 'P3', phase4: 'P4'
  };

  function phaseClass(id) {
    return { phase1:'p1', phase2:'p2', phase3:'p3', phase4:'p4' }[id] || 'open';
  }

  // ---- IDEAS PERSISTENCE ----
  function persistIdeas() {
    try { localStorage.setItem(IDEAS_KEY, JSON.stringify(window.STATE.ideas)); } catch(e) {}
  }
  function applyPersistedIdeas() {
    try {
      var saved = localStorage.getItem(IDEAS_KEY);
      if (saved) window.STATE.ideas = JSON.parse(saved);
    } catch(e) {}
  }

  // ---- DATA HELPERS ----
  function getIdeas() { return window.STATE.ideas || []; }

  function getFiltered() {
    return getIdeas().filter(function(i) {
      if (hideDone && i.status === 'done') return false;
      var phaseOk = activePhase === 'all' ||
        (activePhase === 'open' ? !i.phase_id : i.phase_id === activePhase);
      var prioOk = activePrio === 'all' || i.prio === activePrio;
      var tagsOk = activeTags.length === 0 || activeTags.every(function(t) {
        return (i.tags || []).some(function(it) { return it.toLowerCase() === t.toLowerCase(); });
      });
      return phaseOk && prioOk && tagsOk;
    });
  }

  function getAllTags() {
    // Nur Tags aus Ideen zeigen die dem aktuellen Phase-/Prio-Filter entsprechen
    // (Tag-Filter selbst wird ignoriert, sonst verschwinden Tags beim Anwählen)
    var tagMap = {};
    getIdeas().filter(function(i) {
      var phaseOk = activePhase === 'all' ||
        (activePhase === 'open' ? !i.phase_id : i.phase_id === activePhase);
      var prioOk = activePrio === 'all' || i.prio === activePrio;
      return phaseOk && prioOk;
    }).forEach(function(i) {
      (i.tags || []).forEach(function(t) {
        var key = t.toLowerCase();
        if (!tagMap[key]) tagMap[key] = t;
      });
    });
    return Object.keys(tagMap).sort().map(function(k) { return tagMap[k]; });
  }

  function countByPhase(phase) {
    return getIdeas().filter(function(i) {
      return phase === 'open' ? !i.phase_id : i.phase_id === phase;
    }).length;
  }
  function countByPrio(prio) {
    return getIdeas().filter(function(i) { return i.prio === prio; }).length;
  }
  function countFilteredByPrio(prio) {
    return getFiltered().filter(function(i) { return i.prio === prio; }).length;
  }

  // ---- SIDEBAR ----
  function renderSidebar() {
    var total = getIdeas().length;
    var phases = [
      { key: 'all',    label: 'Alle' },
      { key: 'phase1', label: 'Phase 1' },
      { key: 'phase2', label: 'Phase 2' },
      { key: 'phase3', label: 'Phase 3' },
      { key: 'phase4', label: 'Phase 4' },
      { key: 'open',   label: 'Offen' }
    ];
    var prios = [
      { key: 'high',   label: 'High' },
      { key: 'medium', label: 'Medium' },
      { key: 'low',    label: 'Low' }
    ];

    var html = '';
    // Brand
    var doneCount = getIdeas().filter(function(i) { return i.status === 'done'; }).length;
    html += '<div class="sb-brand">// <b>ideen</b>_board<span class="sb-count">' + total + ' Ideen total' + (doneCount ? ' · ' + doneCount + ' umgesetzt' : '') + '</span></div>';

    // New idea button (top)
    html += '<div class="sb-new"><button class="sb-new-btn" id="sb-new-btn">+ Neue Idee</button></div>';

    // Phase section
    html += '<div class="sb-section">Phasen</div>';
    phases.forEach(function(p) {
      var count = p.key === 'all' ? total : countByPhase(p.key);
      var active = activePhase === p.key ? ' active' : '';
      html += '<button class="sb-item' + active + '" data-phase="' + p.key + '">' +
        '<span class="sb-dot"></span>' +
        '<span class="sb-label">' + p.label + '</span>' +
        '<span class="sb-num">(' + count + ')</span>' +
      '</button>';
    });

    // Prio section
    html += '<div class="sb-section">Priorität</div>';
    prios.forEach(function(pr) {
      var count = countByPrio(pr.key);
      var active = activePrio === pr.key ? ' active' : '';
      html += '<button class="sb-item' + active + '" data-prio="' + pr.key + '">' +
        '<span class="sb-dot"></span>' +
        '<span class="sb-label">' + pr.label + '</span>' +
        '<span class="sb-num">(' + count + ')</span>' +
      '</button>';
    });

    // Tag filter section
    // Hide-done toggle
    html += '<div class="sb-section">Filter</div>';
    html += '<button class="sb-hide-done' + (hideDone ? ' active' : '') + '" id="sb-hide-done">';
    html += '<span class="cb">' + (hideDone ? '✓' : '') + '</span>';
    html += 'Umgesetzt ausblenden';
    html += '</button>';

    var allTags = getAllTags();
    // Aktive Tags bereinigen die nicht mehr in sichtbaren Ideen vorkommen
    var allTagsLower = allTags.map(function(t) { return t.toLowerCase(); });
    activeTags = activeTags.filter(function(t) { return allTagsLower.indexOf(t) >= 0; });
    if (allTags.length > 0) {
      html += '<div class="sb-tags-scroll">';
      html += '<div class="sb-section">Tags</div>';
      html += '<div class="sb-tags-wrap">';
      allTags.forEach(function(tag) {
        var isActive = activeTags.some(function(t) { return t.toLowerCase() === tag.toLowerCase(); });
        html += '<span class="sb-tag-chip' + (isActive ? ' active' : '') + '" data-tag="' + esc(tag) + '">' + esc(tag) + '</span>';
      });
      html += '</div>';
      html += '</div>';
    }

    document.getElementById('sidebar').innerHTML = html;
  }

  function bindSidebar() {
    var sidebar = document.getElementById('sidebar');
    // Alten Listener entfernen durch Ersetzen des Elements
    var clone = sidebar.cloneNode(true);
    sidebar.parentNode.replaceChild(clone, sidebar);
    clone.addEventListener('click', function(e) {
      var btn = e.target.closest('.sb-item');
      if (btn) {
        var grid = document.getElementById('cmd-grid');
        grid.style.opacity = '0';
        setTimeout(function() {
          if (btn.dataset.phase !== undefined) {
            activePhase = btn.dataset.phase;
          } else if (btn.dataset.prio !== undefined) {
            // Toggle prio: click same = reset
            activePrio = activePrio === btn.dataset.prio ? 'all' : btn.dataset.prio;
          }
          expandedId = null;
          renderSidebar();
          renderHeader();
          renderGrid();
          bindSidebar();
          bindCardTagACs();
          grid.style.opacity = '1';
        }, 75);
        return;
      }
      // Tag chip click
      var tagChip = e.target.closest('.sb-tag-chip');
      if (tagChip && tagChip.dataset.tag) {
        var grid = document.getElementById('cmd-grid');
        grid.style.opacity = '0';
        setTimeout(function() {
          var t = tagChip.dataset.tag.toLowerCase();
          var idx = activeTags.indexOf(t);
          if (idx >= 0) activeTags.splice(idx, 1); else activeTags.push(t);
          expandedId = null;
          renderSidebar();
          renderHeader();
          renderGrid();
          bindSidebar();
          bindCardTagACs();
          grid.style.opacity = '1';
        }, 75);
        return;
      }
      // Hide-done toggle
      var hideBtn = e.target.closest('#sb-hide-done');
      if (hideBtn) {
        var grid = document.getElementById('cmd-grid');
        grid.style.opacity = '0';
        setTimeout(function() {
          hideDone = !hideDone;
          expandedId = null;
          renderSidebar();
          renderHeader();
          renderGrid();
          bindSidebar();
          bindCardTagACs();
          grid.style.opacity = '1';
        }, 75);
        return;
      }
      var newBtn = e.target.closest('#sb-new-btn');
      if (newBtn) openPanel();
    });
  }

  // ---- HEADER ----
  function renderHeader() {
    var filtered = getFiltered();
    var highCount = filtered.filter(function(i) { return i.prio === 'high'; }).length;
    var phaseLabel = activePhase === 'all' ? 'Alle Ideen' : (PHASE_LABELS[activePhase] || 'Offen');
    var prioLabel = activePrio !== 'all' ? (' · <b style="color:var(--phase4)">' + activePrio + '</b>') : '';

    var tagLabel = activeTags.length > 0 ? (' · <b style="color:var(--accent)">' + activeTags.length + ' Tag' + (activeTags.length > 1 ? 's' : '') + '</b>') : '';

    document.getElementById('cmd-header').innerHTML =
      '<span class="cmd-header-title">// ideen<b>_board</b></span>' +
      '<span class="cmd-header-stat"><b>' + esc(phaseLabel) + '</b></span>' +
      '<span class="cmd-header-stat">' + filtered.length + ' Ideen' + prioLabel + tagLabel + '</span>' +
      (highCount > 0 ? '<span class="cmd-header-stat" style="color:var(--phase4)"><b>' + highCount + '</b> high</span>' : '') +
      '<button class="cmd-header-export" id="btn-export-ideas" title="Ideas JSON exportieren">↓ Export Ideas JSON</button>';

    document.getElementById('btn-export-ideas').addEventListener('click', exportIdeasJSON);
  }

  // ---- HELPERS ----
  var PHASE_COLORS = {
    phase1: 'var(--phase1)', phase2: 'var(--phase2)',
    phase3: 'var(--phase3)', phase4: 'var(--phase4)'
  };

  function getPhaseSteps(phaseId) {
    if (!window.STATE || !phaseId) return [];
    var phase = window.STATE.phases.find(function(p) { return p.id === phaseId; });
    if (!phase) return [];
    var steps = [];
    if (phase.steps) steps = steps.concat(phase.steps);
    if (phase.sections) phase.sections.forEach(function(s) { steps = steps.concat(s.steps || []); });
    return steps;
  }

  function buildStepOptions(phaseId, selectedStepId) {
    var steps = getPhaseSteps(phaseId);
    var html = '<option value="">— kein Step —</option>';
    steps.forEach(function(st) {
      html += '<option value="' + esc(st.id) + '"' + (st.id === selectedStepId ? ' selected' : '') + '>' + esc(st.id) + '</option>';
    });
    return html;
  }

  function generateStepId(idea) {
    var phase = idea.phase_id ? idea.phase_id.replace('phase', 'p') : 'p0';
    var slug = (idea.title || 'step').toLowerCase()
      .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 30);
    return phase + '-' + slug;
  }

  // ---- CARD HTML ----
  function renderCardHtml(idea) {

    var pc = phaseClass(idea.phase_id);
    var phaseLbl = PHASE_SHORT[idea.phase_id] ? PHASE_SHORT[idea.phase_id] : 'Offen';
    var isExpanded = expandedId === idea.id;
    var commentCount = (idea.comments || []).length;
    var isDone = idea.status === 'done';

    var tags = (idea.tags || []).map(function(t) {
      return '<span class="card-tag ' + tagClass(t) + '">' + esc(t) + '</span>';
    }).join('');

    var commentsHtml = (idea.comments || []).map(function(c) {
      return '<div class="card-comment">' +
        '<div class="card-comment-head">' +
          '<span class="card-comment-date">' + esc(c.date) + (c.edited ? ' · bearbeitet' : '') + '</span>' +
          '<div class="card-comment-actions">' +
            '<button onclick="window._editComment(\'' + esc(idea.id) + '\',\'' + esc(c.id) + '\',event)">✎</button>' +
            '<button onclick="window._deleteComment(\'' + esc(idea.id) + '\',\'' + esc(c.id) + '\',event)">✕</button>' +

    // Phase/Step assign dropdowns
    var phaseOpts = '<option value="">Offen (keine Phase)</option>';
    ['phase1','phase2','phase3','phase4'].forEach(function(pid) {
      phaseOpts += '<option value="' + pid + '"' + (idea.phase_id === pid ? ' selected' : '') + '>' + esc(PHASE_LABELS[pid]) + '</option>';
    });
    var stepOpts = buildStepOptions(idea.phase_id, idea.step_id);

    // Prio dropdown

    return '<div class="cmd-card prio-' + prio + (isExpanded ? ' expanded' : '') + (isDone ? ' is-done' : '') + '" data-id="' + esc(idea.id) + '" draggable="true">' +
      '<div class="card-summary" onclick="window._toggleCard(\'' + esc(idea.id) + '\')">' +
        '<div class="card-top">' +
          '<div class="card-tags">' + tags + (isDone ? '<span class="done-badge">DONE ✓</span>' : '') + '</div>' +
          '<button class="card-close" onclick="window._closeCard(event)">✕</button>' +
        '</div>' +
        '<div class="card-title">' + esc(idea.title) + '</div>' +
        '<div class="card-desc">' + esc(idea.desc || '') + '</div>' +
        '<div class="card-footer">' +
          '<span class="card-prio-dot ' + prio + '"></span>' +
          '<span>' + prio + '</span>' +
          '<span class="card-phase-pill ' + pc + '">' + phaseLbl + '</span>' +
          '<span class="card-footer-spacer"></span>' +
          '<span class="card-comments-badge">💬 ' + commentCount + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-details" id="cd-' + esc(idea.id) + '">' +
        '<div class="card-details-inner">' +
          (idea.desc ? '<div class="card-full-desc">' + esc(idea.desc) + '</div>' : '') +

          '<div class="card-comments-section">' +
            '<div class="card-comments-label">── Kommentare ──</div>' +
            (commentsHtml || '<div class="card-no-comments">(noch keine)</div>') +
            '<div class="card-comment-form">' +
              '<input type="text" id="ci-' + esc(idea.id) + '" placeholder="Schreib einen Kommentar..." onkeydown="if(event.key===\'Enter\')window._saveComment(\'' + esc(idea.id) + '\')">' +

              '<option value="planned"' + (idea.status === 'planned' ? ' selected' : '') + '>Geplant</option>' +
              '<option value="wip"' + (idea.status === 'wip' ? ' selected' : '') + '>In Arbeit</option>' +

              : '<button class="card-btn-done" onclick="window._markDone(\'' + esc(idea.id) + '\',event)">Umgesetzt ✓</button>') +
            (!isDone ? '<button class="card-btn-realize" onclick="window._showRealize(\'' + esc(idea.id) + '\',event)">🚀 Realisieren</button>' : '') +

          '<div class="realize-form" id="rf-' + esc(idea.id) + '">' +

              '<div class="realize-field">' +
                '<label>Ziel-Phase</label>' +
                '<select class="rf-phase" data-idea-id="' + esc(idea.id) + '">' +
                  '<option value="phase1"' + (idea.phase_id === 'phase1' ? ' selected' : '') + '>Phase 1 – Fundament</option>' +
                  '<option value="phase2"' + (idea.phase_id === 'phase2' ? ' selected' : '') + '>Phase 2 – Netz</option>' +
                  '<option value="phase3"' + (idea.phase_id === 'phase3' ? ' selected' : '') + '>Phase 3 – Dienste</option>' +
                  '<option value="phase4"' + (idea.phase_id === 'phase4' ? ' selected' : '') + '>Phase 4 – Security</option>' +
                '</select>' +
              '</div>' +

                '<label>Step-ID</label>' +
                '<input type="text" class="rf-stepid" data-idea-id="' + esc(idea.id) + '" value="' + esc(generateStepId(idea)) + '">' +
              '</div>' +

                '<label>Status</label>' +

              '<button class="realize-cancel" onclick="window._cancelRealize(\'' + esc(idea.id) + '\',event)">Abbrechen</button>' +

  // ---- GRID ----
  function renderGrid() {
    var ideas = getFiltered();
    var grid = document.getElementById('cmd-grid');

    if (ideas.length === 0) {
      grid.innerHTML = '<div class="cmd-empty">// keine_ideen_gefunden</div>';
      return;
    }

    if (activePhase === 'all') {
      // Grouped by phase
      var groups = window.STATE.phases.map(function(p) {
        return { key: p.id, label: p.label + ' – ' + p.title, color: PHASE_COLORS[p.id] || 'var(--muted)' };
      });
      groups.push({ key: null, label: 'Offen (ohne Phase)', color: 'var(--muted)' });

      var PRIO_ORDER = { high: 0, medium: 1, low: 2 };
      var html = '';
      groups.forEach(function(g) {
        var groupIdeas = ideas.filter(function(i) {
          return g.key ? i.phase_id === g.key : !i.phase_id;
        });
        groupIdeas.sort(function(a, b) {
          // Done ideas go to the end
          var da = a.status === 'done' ? 1 : 0;
          var db = b.status === 'done' ? 1 : 0;
          if (da !== db) return da - db;
          var pa = PRIO_ORDER[a.prio] !== undefined ? PRIO_ORDER[a.prio] : 2;
          var pb = PRIO_ORDER[b.prio] !== undefined ? PRIO_ORDER[b.prio] : 2;
          return pa - pb;
        });
        if (groupIdeas.length === 0) return;
        html += '<div class="phase-group-divider" data-phase="' + (g.key || '') + '">' +
          '<span class="phase-group-line" style="background:' + g.color + ';opacity:0.4"></span>' +
          '<span class="phase-group-label" style="color:' + g.color + '">' + esc(g.label) + '</span>' +
          '<span class="phase-group-line" style="background:' + g.color + ';opacity:0.4"></span>' +
          '<span class="phase-group-count">(' + groupIdeas.length + ' Ideen)</span>' +
        '</div>';
        html += groupIdeas.map(renderCardHtml).join('');
      });
      grid.innerHTML = html;
    } else {
      var PRIO_ORDER_FLAT = { high: 0, medium: 1, low: 2 };
      var sorted = ideas.slice().sort(function(a, b) {
        var da = a.status === 'done' ? 1 : 0;
        var db = b.status === 'done' ? 1 : 0;
        if (da !== db) return da - db;
        var pa = PRIO_ORDER_FLAT[a.prio] !== undefined ? PRIO_ORDER_FLAT[a.prio] : 2;
        var pb = PRIO_ORDER_FLAT[b.prio] !== undefined ? PRIO_ORDER_FLAT[b.prio] : 2;
        return pa - pb;
      });
      grid.innerHTML = sorted.map(renderCardHtml).join('');
    }

    // Expand card if needed
    if (expandedId) {
      var detailsEl = document.getElementById('cd-' + expandedId);
      if (detailsEl) detailsEl.style.maxHeight = detailsEl.scrollHeight + 'px';
    }
  }

  // ---- CARD EXPAND / COLLAPSE ----
  window._toggleCard = function(ideaId) {
    if (expandedId === ideaId) {
      // Collapse
      var el = document.getElementById('cd-' + ideaId);
      if (el) { el.style.maxHeight = el.scrollHeight + 'px'; requestAnimationFrame(function() { el.style.maxHeight = '0'; }); }
      expandedId = null;
      setTimeout(function() { renderGrid(); }, 260);
    } else {
      // Collapse previous
      if (expandedId) {
        var prev = document.getElementById('cd-' + expandedId);
        if (prev) prev.style.maxHeight = '0';
      }
      expandedId = ideaId;
      renderGrid();
      // Animate open
      requestAnimationFrame(function() {
        var el = document.getElementById('cd-' + ideaId);
        if (el) {
          el.style.maxHeight = '0';
          requestAnimationFrame(function() {
            el.style.maxHeight = el.scrollHeight + 'px';
            // After transition, allow overflow for dropdowns
            setTimeout(function() { el.style.maxHeight = 'none'; }, 260);
          });
        }
        // Scroll into view
        var card = document.querySelector('[data-id="' + ideaId + '"]');
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    }
  };

  window._closeCard = function(e) {
    e.stopPropagation();
    if (expandedId) {
      var el = document.getElementById('cd-' + expandedId);
      if (el) { el.style.maxHeight = el.scrollHeight + 'px'; requestAnimationFrame(function() { el.style.maxHeight = '0'; }); }
      expandedId = null;
      setTimeout(function() { renderGrid(); }, 260);
    }
  };

  // ---- COMMENTS ----
  window._saveComment = function(ideaId) {
    var inp = document.getElementById('ci-' + ideaId);
    var text = inp ? inp.value.trim() : '';
    if (!text) return;
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    if (!idea.comments) idea.comments = [];
    idea.comments.push({ id: 'c-' + Date.now(), date: new Date().toISOString().split('T')[0], text: text, edited: false });
    persistIdeas();
    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  };

  window._deleteComment = function(ideaId, commentId, e) {
    if (e) e.stopPropagation();
    if (!confirm('Kommentar löschen?')) return;
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.comments = (idea.comments || []).filter(function(c) { return c.id !== commentId; });
    persistIdeas();
    renderGrid();
  };

  window._editComment = function(ideaId, commentId, e) {
    if (e) e.stopPropagation();
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    var comment = (idea.comments || []).find(function(c) { return c.id === commentId; });
    if (!comment) return;
    var newText = prompt('Kommentar bearbeiten:', comment.text);
    if (newText === null) return;
    comment.text = newText.trim();
    comment.edited = true;
    persistIdeas();
    renderGrid();
  };

  // ---- STATUS CHANGE ----
  window._changeStatus = function(ideaId, newStatus) {
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.status = newStatus;
    persistIdeas();
  };

  // ---- PHASE / STEP REASSIGN ----
  window._changePhase = function(ideaId, newPhase) {
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.phase_id = newPhase || null;
    idea.step_id = null;
    persistIdeas();
    expandedId = null;
    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  };

  window._changeStep = function(ideaId, newStep) {
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.step_id = newStep || null;
    persistIdeas();
  };

  // ---- PRIO CHANGE ----
  window._changePrio = function(ideaId, newPrio) {
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.prio = newPrio;
    persistIdeas();
    expandedId = null;
    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  };

  // ---- DELETE IDEA ----
  window._deleteIdea = function(ideaId, e) {
    if (e) e.stopPropagation();
    var ideas = getIdeas();
    var idx = ideas.findIndex(function(i) { return i.id === ideaId; });
    if (idx < 0) return;
    if (!confirm('Idee \u201e' + ideas[idx].title + '\u201c wirklich l\u00f6schen?')) return;
    ideas.splice(idx, 1);
    persistIdeas();
    expandedId = null;
    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  };

  // ---- MARK DONE / UNDONE ----
  window._markDone = function(ideaId, e) {
    if (e) e.stopPropagation();
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.status = 'done';
    persistIdeas();
    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  };

  window._markUndone = function(ideaId, e) {
    if (e) e.stopPropagation();
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.status = 'idea';
    persistIdeas();
    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  };

  // ---- REALIZE: Convert idea → roadmap step ----
  window._showRealize = function(ideaId, e) {
    if (e) e.stopPropagation();
    var form = document.getElementById('rf-' + ideaId);
    if (!form) return;
    form.classList.toggle('open');
    if (!form.classList.contains('open')) return;

    // Show/hide section dropdown for phase3/4
    var phaseSelect = form.querySelector('.rf-phase');
    var sectionWrap = form.querySelector('.rf-section-wrap');
    updateSectionDropdown(phaseSelect.value, form);

    phaseSelect.addEventListener('change', function() {
      // Regenerate step ID with new phase
      var idea = getIdeas().find(function(i) { return i.id === ideaId; });
      if (idea) {
        var tmpIdea = { phase_id: phaseSelect.value, title: idea.title };
        form.querySelector('.rf-stepid').value = generateStepId(tmpIdea);
      }
      updateSectionDropdown(phaseSelect.value, form);
    });
  };

  function updateSectionDropdown(phaseId, form) {
    var sectionWrap = form.querySelector('.rf-section-wrap');
    var sectionSelect = form.querySelector('.rf-section');
    if (!window.STATE) { sectionWrap.style.display = 'none'; return; }
    var phase = window.STATE.phases.find(function(p) { return p.id === phaseId; });
    if (!phase || !phase.sections || phase.sections.length === 0) {
      sectionWrap.style.display = 'none';
      return;
    }
    sectionWrap.style.display = '';
    var html = '';
    phase.sections.forEach(function(sec, idx) {
      html += '<option value="' + idx + '">' + esc(sec.label) + '</option>';
    });
    sectionSelect.innerHTML = html;
  }

  window._cancelRealize = function(ideaId, e) {
    if (e) e.stopPropagation();
    var form = document.getElementById('rf-' + ideaId);
    if (form) form.classList.remove('open');
  };

  window._confirmRealize = function(ideaId, e) {
    if (e) e.stopPropagation();
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    var form = document.getElementById('rf-' + ideaId);
    if (!form) return;

    var phaseId = form.querySelector('.rf-phase').value;
    var stepId = form.querySelector('.rf-stepid').value.trim();
    var status = form.querySelector('.rf-status').value;
    var sectionSelect = form.querySelector('.rf-section');
    var sectionIdx = null;

    if (!stepId) { alert('Step-ID darf nicht leer sein.'); return; }

    // Check if step ID already exists
    if (window.findStep && window.findStep(stepId)) {
      alert('Step-ID "' + stepId + '" existiert bereits.');
      return;
    }

    // Determine section index for phase3/4
    var phase = window.STATE.phases.find(function(p) { return p.id === phaseId; });
    if (phase && phase.sections && phase.sections.length > 0) {
      sectionIdx = sectionSelect ? parseInt(sectionSelect.value, 10) : 0;
    }

    var today = new Date().toISOString().split('T')[0];
    var step = {
      id: stepId,
      title: idea.title,
      status: status,
      tags: (idea.tags || []).slice(),
      desc: idea.desc || idea.title,
      notes: '',
      log: [{ date: today, entry: 'Aus Idee [' + idea.id + '] erstellt' }]
    };

    // Persist via state.js helper
    if (window.addCustomStep) {
      window.addCustomStep(phaseId, sectionIdx, step);
    }

    // Mark idea as done + link to step
    idea.status = 'done';
    idea.step_id = stepId;
    persistIdeas();

    // Feedback
    var fb = document.getElementById('rf-fb-' + ideaId);
    if (fb) {
      fb.textContent = '✓ Step "' + stepId + '" erstellt in ' + (PHASE_LABELS[phaseId] || phaseId);
      fb.style.display = 'block';
    }

    // Re-render after short delay
    setTimeout(function() {
      expandedId = null;
      renderSidebar();
      renderHeader();
      renderGrid();
      bindSidebar();
      bindCardTagACs();
    }, 800);
  };

  // ---- EXPORT IDEAS JSON ----
  function exportIdeasJSON() {
    var ideas = getIdeas();
    var payload = {
      meta: {
        version: '1.0',
        updated: new Date().toISOString().split('T')[0]
      },
      ideas: ideas
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'homelab-ideas.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---- TAG EDITING ----
  window._removeTag = function(ideaId, tag, e) {
    if (e) e.stopPropagation();
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    idea.tags = (idea.tags || []).filter(function(t) { return t !== tag; });
    persistIdeas();
    renderSidebar();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  };

  /* ============================== */
  /* TAG AUTOCOMPLETE ENGINE         */
  /* ============================== */
  function collectAllTagNames() {
    var map = {};
    getIdeas().forEach(function(i) {
      (i.tags || []).forEach(function(t) { map[t.toLowerCase()] = t; });
    });
    return Object.keys(map).sort().map(function(k) { return map[k]; });
  }

  function setupTagAutocomplete(input, dropdown, opts) {
    // opts: { onAdd: fn(tagValue), getExisting: fn() => [string] }
    var hlIdx = -1;

    function refresh() {
      var val = input.value.trim().toLowerCase();
      var existing = opts.getExisting();
      var existingLower = existing.map(function(t) { return t.toLowerCase(); });
      var allTags = collectAllTagNames().filter(function(t) {
        return existingLower.indexOf(t.toLowerCase()) < 0;
      });
      var matches = val ? allTags.filter(function(t) { return t.toLowerCase().indexOf(val) !== -1; }) : allTags;
      var html = '';
      matches.forEach(function(t, i) {
        html += '<div class="tag-ac-opt" data-idx="' + i + '" data-val="' + esc(t) + '">' + esc(t) + '</div>';
      });
      // Create option if typed text is new
      if (val && !allTags.some(function(t) { return t.toLowerCase() === val; }) && existingLower.indexOf(val) < 0) {
        html += '<div class="tag-ac-opt create" data-idx="' + matches.length + '" data-val="' + esc(input.value.trim()) + '">Tag erstellen: ' + esc(input.value.trim()) + '</div>';
      }
      dropdown.innerHTML = html;
      hlIdx = -1;
      if (html) dropdown.classList.add('open'); else dropdown.classList.remove('open');
    }

    function pick(val) {
      if (!val) return;
      opts.onAdd(val);
      input.value = '';
      dropdown.classList.remove('open');
      hlIdx = -1;
    }

    function setHighlight(idx) {
      var items = dropdown.querySelectorAll('.tag-ac-opt');
      items.forEach(function(el) { el.classList.remove('hl'); });
      if (idx >= 0 && idx < items.length) {
        items[idx].classList.add('hl');
        items[idx].scrollIntoView({ block: 'nearest' });
      }
      hlIdx = idx;
    }

    input.addEventListener('input', refresh);
    input.addEventListener('focus', refresh);

    input.addEventListener('keydown', function(e) {
      var items = dropdown.querySelectorAll('.tag-ac-opt');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setHighlight(Math.min(hlIdx + 1, items.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setHighlight(Math.max(hlIdx - 1, 0));
      } else if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        if (hlIdx >= 0 && items[hlIdx]) {
          pick(items[hlIdx].dataset.val);
        } else {
          var val = input.value.replace(/,/g, '').trim();
          if (val) pick(val);
        }
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
        hlIdx = -1;
      }
    });

    dropdown.addEventListener('mousedown', function(e) {
      e.preventDefault(); // Keep input focus
      var opt = e.target.closest('.tag-ac-opt');
      if (opt) pick(opt.dataset.val);
    });

    // Close on outside click
    document.addEventListener('click', function(e) {
      if (!input.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
        hlIdx = -1;
      }
    });
  }

  /* Panel tag autocomplete state */
  var panelTags = [];

  function renderPanelTagChips() {
    var container = document.getElementById('sp-tag-chips');
    container.innerHTML = panelTags.map(function(t) {
      return '<span class="sp-tag-chip">' + esc(t) +
        '<button data-tag="' + esc(t) + '">✕</button></span>';
    }).join('');
    container.querySelectorAll('button').forEach(function(btn) {
      btn.addEventListener('click', function() {
        panelTags = panelTags.filter(function(x) { return x !== btn.dataset.tag; });
        renderPanelTagChips();
      });
    });
  }

  function initPanelTagAC() {
    var input = document.getElementById('idea-tags');
    var drop = document.getElementById('sp-tag-drop');
    setupTagAutocomplete(input, drop, {
      getExisting: function() { return panelTags; },
      onAdd: function(val) {
        var dup = panelTags.some(function(t) { return t.toLowerCase() === val.toLowerCase(); });
        if (!dup) { panelTags.push(val); renderPanelTagChips(); }
      }
    });
  }

  /* Card-back tag autocomplete */
  function initCardTagAC(ideaId, input, drop) {
    var idea = getIdeas().find(function(i) { return i.id === ideaId; });
    if (!idea) return;
    setupTagAutocomplete(input, drop, {
      getExisting: function() { return idea.tags || []; },
      onAdd: function(val) {
        if (!idea.tags) idea.tags = [];
        var dup = idea.tags.some(function(t) { return t.toLowerCase() === val.toLowerCase(); });
        if (!dup) {
          idea.tags.push(val);
          persistIdeas();
          renderSidebar();
          renderGrid();
          bindSidebar();
          bindCardTagACs();
        }
      }
    });
  }

  function bindCardTagACs() {
    document.querySelectorAll('.card-tag-input[data-idea-id]').forEach(function(input) {
      if (input._acBound) return;
      input._acBound = true;
      var drop = input.parentElement.querySelector('.tag-ac-drop');
      if (drop) initCardTagAC(input.dataset.ideaId, input, drop);
    });
  }

  // ---- SLIDE PANEL (NEW IDEA) ----
  function openPanel() {
    panelTags = [];
    renderPanelTagChips();
    document.getElementById('slide-panel').classList.add('open');
    document.getElementById('slide-overlay').classList.add('open');
    setTimeout(function() { document.getElementById('idea-title').focus(); }, 260);
  }
  function closePanel() {
    document.getElementById('slide-panel').classList.remove('open');
    document.getElementById('slide-overlay').classList.remove('open');
    // Reset form
    ['idea-title','idea-desc','idea-tags'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('idea-phase').value = '';
    document.getElementById('idea-prio').value = 'medium';
    panelTags = [];
    renderPanelTagChips();
  }

  function submitIdea() {
    var title = document.getElementById('idea-title').value.trim();
    if (!title) { document.getElementById('idea-title').focus(); return; }
    var desc     = document.getElementById('idea-desc').value.trim();
    var phase_id = document.getElementById('idea-phase').value || null;
    var prio     = document.getElementById('idea-prio').value;
    var tags     = panelTags.slice();

    if (!window.STATE.ideas) window.STATE.ideas = [];
    window.STATE.ideas.unshift({
      id: 'idea-' + Date.now(), title: title, desc: desc,
      phase_id: phase_id, step_id: null, prio: prio,
      status: 'idea', tags: tags, comments: []
    });
    persistIdeas();
    closePanel();

    if (phase_id) { activePhase = phase_id; activePrio = 'all'; }
    expandedId = null;
    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindCardTagACs();
  }

  function bindPanel() {
    document.getElementById('sp-close').addEventListener('click', closePanel);
    document.getElementById('sp-cancel').addEventListener('click', closePanel);
    document.getElementById('slide-overlay').addEventListener('click', closePanel);
    document.getElementById('sp-submit').addEventListener('click', submitIdea);
    document.getElementById('fab-mobile').addEventListener('click', openPanel);

    // Enter in title field submits
    document.getElementById('idea-title').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); submitIdea(); }
    });
  }

  // ---- DRAG & DROP (phase reassign in "Alle" view) ----
  function bindDragDrop() {
    var grid = document.getElementById('cmd-grid');

    grid.addEventListener('dragstart', function(e) {
      if (activePhase !== 'all') { e.preventDefault(); return; }
      var card = e.target.closest('.cmd-card');
      if (!card) return;
      // Don't drag expanded cards
      if (card.classList.contains('expanded')) { e.preventDefault(); return; }
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    });

    grid.addEventListener('dragend', function(e) {
      var card = e.target.closest('.cmd-card');
      if (card) card.classList.remove('dragging');
      grid.querySelectorAll('.phase-group-divider.drag-over').forEach(function(d) {
        d.classList.remove('drag-over');
      });
    });

    grid.addEventListener('dragover', function(e) {
      if (activePhase !== 'all') return;
      var divider = e.target.closest('.phase-group-divider[data-phase]');
      if (!divider) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      // Highlight only this divider
      grid.querySelectorAll('.phase-group-divider.drag-over').forEach(function(d) {
        if (d !== divider) d.classList.remove('drag-over');
      });
      divider.classList.add('drag-over');
    });

    grid.addEventListener('dragleave', function(e) {
      var divider = e.target.closest('.phase-group-divider[data-phase]');
      if (!divider) return;
      // Only remove if truly leaving the divider
      if (!divider.contains(e.relatedTarget)) {
        divider.classList.remove('drag-over');
      }
    });

    grid.addEventListener('drop', function(e) {
      e.preventDefault();
      if (activePhase !== 'all') return;
      var divider = e.target.closest('.phase-group-divider[data-phase]');
      if (!divider) return;
      divider.classList.remove('drag-over');

      var ideaId = e.dataTransfer.getData('text/plain');
      if (!ideaId) return;
      var targetPhase = divider.dataset.phase || null;

      var idea = getIdeas().find(function(i) { return i.id === ideaId; });
      if (!idea) return;
      // Same phase — no change
      if ((idea.phase_id || null) === targetPhase) return;

      idea.phase_id = targetPhase;
      idea.step_id = null;
      persistIdeas();
      expandedId = null;
      renderSidebar();
      renderHeader();
      renderGrid();
      bindSidebar();
      bindCardTagACs();

      // Green flash on the moved card
      setTimeout(function() {
        var card = document.querySelector('.cmd-card[data-id="' + ideaId + '"]');
        if (card) {
          card.classList.add('drop-flash');
          card.addEventListener('animationend', function() { card.classList.remove('drop-flash'); }, { once: true });
        }
      }, 50);
    });
  }

  // ---- INIT ----
  function init() {
    if (!window.STATE) {
      document.getElementById('cmd-grid').innerHTML = '<div class="cmd-empty">// state_nicht_geladen – bitte über lokalen Server öffnen (npx serve .)</div>';
      return;
    }

    // Apply persisted idea changes
    applyPersistedIdeas();

    // URL filter
    var params = new URLSearchParams(window.location.search);
    var f = params.get('filter');
    if (f && ['phase1','phase2','phase3','phase4','open'].includes(f)) activePhase = f;
    if (f && ['high','medium','low'].includes(f)) activePrio = f;

    renderSidebar();
    renderHeader();
    renderGrid();
    bindSidebar();
    bindPanel();
    initPanelTagAC();
    bindCardTagACs();
    bindDragDrop();
  }

  window.addEventListener('state-ready', init);
})();
</script>
