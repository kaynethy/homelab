<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homelab – Step</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
</head>
<body>
<div class="wrap">
  <div id="nav"></div>
  <div class="breadcrumb" id="breadcrumb">
    <a href="../index.html">Dashboard</a><span class="sep">›</span>
    <a href="" id="bc-phase">Phase</a><span class="sep">›</span>
    <span id="bc-step">Step</span>
  </div>

  <div id="step-content"><p style="color:var(--muted)">Lade...</p></div>

  <footer>homelab_roadmap · <span>step_detail</span></footer>
</div>

<script src="../assets/state.js"></script>
<script src="../assets/nav.js"></script>
<script>
(function() {
  'use strict';

  var PHASE_NUM = { phase1: 1, phase2: 2, phase3: 3, phase4: 4 };

  function getStepId() {
    // 1. URL-Parameter ?id=STEP_ID (generischer Modus)
    var params = new URLSearchParams(window.location.search);
    if (params.get('id')) return params.get('id');
    // 2. Hash #STEP_ID
    if (window.location.hash && window.location.hash.length > 1) return window.location.hash.substring(1);
    // 3. Fallback: Dateiname (für individuelle Step-Dateien wie p1-bios.html)
    var path = window.location.pathname;
    var file = path.split('/').pop();
    var name = file.replace('.html', '');
    if (name !== 'step') return name;
    return null;
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatKey(key) {
    return key.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  function isSpecialKey(key, suffix) {
    return key.endsWith(suffix);
  }

  function renderDetails(obj) {
    var html = '';
    var keys = Object.keys(obj);
    keys.forEach(function(key) {
      html += renderDetailEntry(key, obj[key], 0);
    });
    return html;
  }

  function renderDetailEntry(key, value, depth) {
    if (depth >= 3) {
      return '<div class="details-block" style="margin:8px 0">' + escHtml(JSON.stringify(value, null, 2)) + '</div>';
    }

    // _why / _note → callout
    if (isSpecialKey(key, '_why') || isSpecialKey(key, '_note')) {
      var label = key.replace(/_(why|note)$/, '').replace(/_/g, ' ').toUpperCase();
      var icon = isSpecialKey(key, '_why') ? 'ℹ️ Warum' : '📝';
      return '<div class="callout"><div class="callout-label">' + icon + ' ' + escHtml(label) + '</div>' + escHtml(String(value)) + '</div>';
    }

    // _cmd / _command → code block with copy button
    if (isSpecialKey(key, '_cmd') || isSpecialKey(key, '_command')) {
      var cmdLabel = key.replace(/_(cmd|command)$/, '').replace(/_/g, ' ').toUpperCase();
      var cmdId = 'cmd-' + Math.random().toString(36).substr(2, 6);
      return '<div class="detail-section"><div class="detail-section-label">' + escHtml(cmdLabel) + '</div>' +
        '<div class="detail-code-wrap"><pre class="detail-code" id="' + cmdId + '">' + escHtml(String(value)) + '</pre>' +
        '<button class="detail-copy-btn" onclick="var t=document.getElementById(\'' + cmdId + '\').textContent;navigator.clipboard.writeText(t);this.textContent=\'✓\';var b=this;setTimeout(function(){b.textContent=\'Copy\'},1200)">Copy</button></div></div>';
    }

    var label = formatKey(key);

    // String / Number / Boolean
    if (value === null || typeof value !== 'object') {
      return '<div class="detail-kv"><span class="detail-key">' + escHtml(label) + '</span><span class="detail-val">' + escHtml(String(value)) + '</span></div>';
    }

    // Array
    if (Array.isArray(value)) {
      if (value.length === 0) return '';
      // Array of primitives → list
      if (typeof value[0] !== 'object') {
        var items = value.map(function(v, i) { return '<li>' + escHtml(String(v)) + '</li>'; }).join('');
        return '<div class="detail-section"><div class="detail-section-label">' + escHtml(label) + '</div><ol class="detail-list">' + items + '</ol></div>';
      }
      // Array of objects → recurse
      var arrHtml = value.map(function(v, i) { return renderDetailEntry(String(i), v, depth + 1); }).join('');
      return '<div class="detail-section"><div class="detail-section-label">' + escHtml(label) + '</div>' + arrHtml + '</div>';
    }

    // Object → subsection with recursion
    var subKeys = Object.keys(value);
    var inner = '';
    subKeys.forEach(function(sk) {
      inner += renderDetailEntry(sk, value[sk], depth + 1);
    });
    return '<div class="detail-section"><div class="detail-section-label">' + escHtml(label) + '</div><div class="detail-nested">' + inner + '</div></div>';
  }

  function init() {
    if (!window.STATE) return;
    var stepId = getStepId();
    if (!stepId) {
      document.getElementById('step-content').innerHTML = '<p style="color:var(--muted)">Kein Step angegeben. Nutze ?id=STEP_ID</p>';
      return;
    }
    var result = window.findStep(stepId);
    if (!result) {
      document.getElementById('step-content').innerHTML = '<p style="color:var(--muted)">Step nicht gefunden: ' + escHtml(stepId) + '</p>';
      return;
    }

    var step = result.step;
    var phase = result.phase;
    var pNum = PHASE_NUM[phase.id];

    document.title = 'Homelab – ' + step.title;
    document.getElementById('bc-phase').href = '../phases/' + phase.id + '.html';
    document.getElementById('bc-phase').textContent = 'Phase ' + pNum + ' – ' + phase.title;
    document.getElementById('bc-step').textContent = step.title;

    renderStep(step, phase, pNum);
  }

  function renderStep(step, phase, pNum) {
    var tags = (step.tags || []).map(function(t) { return '<span class="tag">' + escHtml(t) + '</span>'; }).join('');
    var statusColors = { done: 'var(--done)', wip: 'var(--wip)', todo: 'var(--muted)', deferred: 'var(--muted)' };
    var sc = statusColors[step.status] || 'var(--border)';
    var statusLabel = step.status === 'deferred' ? 'später' : step.status;
    var statusBadge = '<span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid ' + sc + ';color:' + sc + ';background:transparent">' + statusLabel + '</span>';

    var detailsHtml = '';
    if (step.details) {
      detailsHtml = '<div class="section-label">Details</div>' + renderDetails(step.details);
    }

    var log = (step.log || []).slice().sort(function(a,b) { return b.date.localeCompare(a.date); });
    var logHtml = log.length
      ? log.map(function(l) { return '<li class="log-entry"><span class="log-date">' + escHtml(l.date) + '</span><span class="log-text">' + escHtml(l.entry) + '</span></li>'; }).join('')
      : '<li class="log-entry" style="color:var(--muted);font-style:italic">Keine Einträge</li>';

    var stepIdeas = (window.STATE.ideas || []).filter(function(i) { return i.step_id === step.id; });
    var ideasHtml = stepIdeas.length
      ? stepIdeas.map(function(i) {
          return '<div class="card" style="margin-bottom:8px">' +
            '<span class="prio-badge ' + i.prio + '">' + i.prio + '</span>' +
            '<div class="card-title" style="margin-top:6px">' + escHtml(i.title) + '</div>' +
            '<div class="card-desc">' + escHtml(i.desc||'') + '</div>' +
          '</div>';
        }).join('')
      : '<p style="color:var(--muted);font-size:12px;margin-bottom:12px">Keine Ideen zu diesem Step.</p>';

    document.getElementById('step-content').innerHTML =
      '<div class="step-header">' +
        '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px">' +
          '<span class="phase-num p' + pNum + '" style="display:inline-block">PHASE ' + pNum + '</span>' +
          statusBadge +
        '</div>' +
        '<div class="step-title">' + escHtml(step.title) + '</div>' +
        '<div class="tags">' + tags + '</div>' +
      '</div>' +
      '<div class="status-toggles" id="status-toggles"></div>' +
      '<div class="section-label">Beschreibung</div>' +
      '<div style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:16px">' + escHtml(step.desc||'') + '</div>' +
      detailsHtml +
      '<div class="section-label">Notizen</div>' +
      '<textarea class="notes-area" id="step-notes" placeholder="Notizen hier...">' + escHtml(step.notes||'') + '</textarea>' +
      '<div class="section-label" style="margin-top:20px">Log</div>' +
      '<ul class="log-list" id="log-list">' + logHtml + '</ul>' +
      '<div class="log-form" style="margin-bottom:24px">' +
        '<input type="text" id="log-input" placeholder="Neuer Log-Eintrag...">' +
        '<button class="btn btn-sm" id="log-add">+ Log</button>' +
      '</div>' +
      '<div class="section-label">Ideen zu diesem Step</div>' +
      '<div id="step-ideas">' + ideasHtml + '</div>' +
      '<button class="btn btn-sm" id="btn-add-idea">+ Idee hinzufügen</button>' +
      '<div class="form-inline" id="step-idea-form" style="margin-top:12px">' +
        '<div class="form-group"><label>Titel</label><input type="text" id="si-title" placeholder="Ideen-Titel..."></div>' +
        '<div class="form-group"><label>Beschreibung</label><textarea id="si-desc" placeholder="Kurze Beschreibung..."></textarea></div>' +
        '<div class="form-group"><label>Priorität</label><select id="si-prio"><option value="high">⚡ High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>' +
        '<div class="form-actions">' +
          '<button class="btn-accent" id="si-save">Speichern</button>' +
          '<button class="btn btn-secondary" id="si-cancel">Abbrechen</button>' +
        '</div>' +
      '</div>' +
      '<hr style="border:none;border-top:1px solid var(--border);margin:32px 0 16px">' +
      '<div style="text-align:right">' +
        '<button id="btn-delete-step" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;padding:6px 14px;border-radius:4px;border:1px solid rgba(239,68,68,0.4);background:transparent;color:rgba(239,68,68,0.7);cursor:pointer;transition:all 0.15s"' +
          ' onmouseover="this.style.borderColor=\'#ef4444\';this.style.color=\'#ef4444\';this.style.background=\'rgba(239,68,68,0.08)\'"' +
          ' onmouseout="this.style.borderColor=\'rgba(239,68,68,0.4)\';this.style.color=\'rgba(239,68,68,0.7)\';this.style.background=\'transparent\'"' +
          '>🗑 Step entfernen</button>' +
      '</div>';

    renderStatusToggles(step, phase);
    bindStepEvents(step, phase);
  }

  function renderStatusToggles(step, phase) {
    var statuses = ['todo','wip','done','deferred'];
    var labels = { todo: 'todo', wip: 'wip', done: 'done', deferred: 'später' };
    var html = statuses.map(function(s) {
      return '<button class="status-btn' + (s === step.status ? ' active-'+s : '') + '" data-status="' + s + '">' + labels[s] + '</button>';
    }).join('');

    // Deferred reason inline form (hidden by default)
    html += '<div id="deferred-reason-form" style="display:none;margin-top:10px;width:100%">' +
      '<input type="text" id="deferred-reason-input" placeholder="Warum zurückstellen? (optional)" ' +
        'style="width:100%;max-width:400px;padding:6px 10px;font-size:12px;font-family:\'JetBrains Mono\',monospace;' +
        'background:var(--bg);border:1px solid var(--muted);border-radius:4px;color:var(--text);outline:none">' +
      '<div style="display:flex;gap:8px;margin-top:6px">' +
        '<button class="btn btn-sm" id="deferred-confirm" style="border-color:var(--muted);color:var(--muted)">Zurückstellen</button>' +
        '<button class="btn btn-sm" id="deferred-cancel">Abbrechen</button>' +
      '</div>' +
    '</div>';

    // Show existing reason if deferred
    if (step.status === 'deferred' && step.deferred_reason) {
      html += '<div style="margin-top:8px;font-size:12px;color:var(--muted);font-style:italic">' +
        '⏸ ' + escHtml(step.deferred_reason) + '</div>';
    }

    document.getElementById('status-toggles').innerHTML = html;

    document.querySelectorAll('#status-toggles .status-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var newStatus = btn.dataset.status;
        if (newStatus === 'deferred') {
          // Show reason form instead of immediately setting
          var form = document.getElementById('deferred-reason-form');
          form.style.display = 'block';
          document.getElementById('deferred-reason-input').value = step.deferred_reason || '';
          document.getElementById('deferred-reason-input').focus();
          return;
        }
        // Non-deferred: if reactivating, clear reason
        if (step.status === 'deferred') {
          step.deferred_reason = '';
        }
        step.status = newStatus;
        window.saveState();
        renderStatusToggles(step, phase);
      });
    });

    var confirmBtn = document.getElementById('deferred-confirm');
    var cancelBtn = document.getElementById('deferred-cancel');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', function() {
        step.deferred_reason = document.getElementById('deferred-reason-input').value.trim();
        step.status = 'deferred';
        window.saveState();
        renderStatusToggles(step, phase);
      });
    }
    if (cancelBtn) {
      cancelBtn.addEventListener('click', function() {
        document.getElementById('deferred-reason-form').style.display = 'none';
      });
    }
  }

  function bindStepEvents(step, phase) {
    document.getElementById('step-notes').addEventListener('blur', function() {
      step.notes = document.getElementById('step-notes').value;
      window.saveState();
    });

    function logAdd() {
      var input = document.getElementById('log-input');
      var text = input.value.trim();
      if (!text) return;
      if (!step.log) step.log = [];
      var today = new Date().toISOString().split('T')[0];
      step.log.push({ date: today, entry: text });
      window.saveState();
      input.value = '';
      var sorted = step.log.slice().sort(function(a,b) { return b.date.localeCompare(a.date); });
      document.getElementById('log-list').innerHTML = sorted.map(function(l) {
        return '<li class="log-entry"><span class="log-date">' + escHtml(l.date) + '</span><span class="log-text">' + escHtml(l.entry) + '</span></li>';
      }).join('');
    }

    document.getElementById('log-add').addEventListener('click', logAdd);
    document.getElementById('log-input').addEventListener('keydown', function(e) { if (e.key==='Enter') logAdd(); });

    document.getElementById('btn-add-idea').addEventListener('click', function() {
      document.getElementById('step-idea-form').classList.toggle('open');
    });
    document.getElementById('si-cancel').addEventListener('click', function() {
      document.getElementById('step-idea-form').classList.remove('open');
    });
    document.getElementById('si-save').addEventListener('click', function() {
      var title = document.getElementById('si-title').value.trim();
      if (!title) return;
      var desc = document.getElementById('si-desc').value.trim();
      var prio = document.getElementById('si-prio').value;
      if (!window.STATE.ideas) window.STATE.ideas = [];
      var id = 'idea-' + Date.now();
      window.STATE.ideas.push({ id: id, title: title, desc: desc, phase_id: phase.id, step_id: step.id, prio: prio, status: 'idea', tags: [], comments: [] });
      window.saveState();
      document.getElementById('si-title').value = '';
      document.getElementById('si-desc').value = '';
      document.getElementById('step-idea-form').classList.remove('open');
      var stepIdeas = (window.STATE.ideas || []).filter(function(i) { return i.step_id === step.id; });
      document.getElementById('step-ideas').innerHTML = stepIdeas.map(function(i) {
        return '<div class="card" style="margin-bottom:8px">' +
          '<span class="prio-badge ' + i.prio + '">' + i.prio + '</span>' +
          '<div class="card-title" style="margin-top:6px">' + escHtml(i.title) + '</div>' +
          '<div class="card-desc">' + escHtml(i.desc||'') + '</div>' +
        '</div>';
      }).join('');
    });

    // Delete step button
    document.getElementById('btn-delete-step').addEventListener('click', function() {
      if (!confirm('Step \'' + step.title + '\' wirklich aus der Roadmap entfernen? Diese Aktion kann nicht rückgängig gemacht werden.')) return;

      // Check if step was created from an idea (log contains "Aus Idee [idea-...]")
      var linkedIdeaId = null;
      if (step.log) {
        for (var i = 0; i < step.log.length; i++) {
          var match = (step.log[i].entry || '').match(/Aus Idee \[(idea-[^\]]+)\]/);
          if (match) { linkedIdeaId = match[1]; break; }
        }
      }

      // If linked idea found, revert it to "idea" status
      if (linkedIdeaId) {
        var IDEAS_KEY = 'homelab_ideas_data';
        try {
          var saved = localStorage.getItem(IDEAS_KEY);
          var ideas = saved ? JSON.parse(saved) : ((window.STATE && window.STATE.ideas) || []);
          var idea = ideas.find(function(i) { return i.id === linkedIdeaId; });
          if (idea && idea.status === 'done') {
            idea.status = 'idea';
            idea.step_id = '';
            localStorage.setItem(IDEAS_KEY, JSON.stringify(ideas));
          }
        } catch(e) {}
        // Also update in-memory STATE.ideas
        if (window.STATE && window.STATE.ideas) {
          var stateIdea = window.STATE.ideas.find(function(i) { return i.id === linkedIdeaId; });
          if (stateIdea && stateIdea.status === 'done') {
            stateIdea.status = 'idea';
            stateIdea.step_id = '';
          }
        }
      }

      // Remove step via state.js helper
      if (window.removeCustomStep) {
        window.removeCustomStep(step.id);
      }

      // Redirect to parent phase page
      window.location.href = '../phases/' + phase.id + '.html';
    });
  }

  window.addEventListener('state-ready', init);
})();
</script>
</body>
</html>
