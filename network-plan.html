<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homelab – Netzwerk-Plan</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/dist/dist/vis-network.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
  <style>
    /* === NETWORK DIAGRAM === */
    .net-diagram-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .net-diagram-wrap svg text {
      font-family: 'JetBrains Mono', monospace;
    }

    /* === SUBNET SECTIONS === */
    .subnet-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .subnet-section:hover { border-color: var(--border2); }
    .subnet-section.open { border-color: var(--accent2); }

    .subnet-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      user-select: none;
    }

    .subnet-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .subnet-info { flex: 1; min-width: 0; }
    .subnet-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
    }
    .subnet-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .subnet-toggle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .subnet-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
      border-top: 1px solid transparent;
    }
    .subnet-section.open .subnet-body {
      max-height: 9999px;
      border-top-color: var(--border);
    }
    .subnet-body-inner { padding: 20px; }

    /* IP table */
    .ip-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .ip-table th {
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ip-table td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .ip-table tr:last-child td { border-bottom: none; }
    .ip-table .ip-col { font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.active   { background: var(--done); }
    .status-dot.planned  { background: var(--muted); }
    .status-dot.reserved { background: var(--border); }

    .dhcp-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 8px 12px;
      background: var(--bg3);
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .idea-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent2);
      text-decoration: none;
    }
    .idea-link:hover { text-decoration: underline; }

    /* Firewall / Migration / Principles */
    .net-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .net-table th {
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .net-table td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .net-table tr:last-child td { border-bottom: none; }
    .net-table .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .rule-allow { color: var(--done); }
    .rule-block { color: #ef4444; }
    .rule-partial { color: var(--wip); }

    .migration-pending  { color: var(--wip); }
    .migration-done     { color: var(--done); }
    .migration-nochange { color: var(--muted); }

    .principles-list {
      list-style: none;
      counter-reset: principle;
    }
    .principles-list li {
      counter-increment: principle;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      display: flex;
      gap: 10px;
    }
    .principles-list li:last-child { border-bottom: none; }
    .principles-list li::before {
      content: counter(principle, decimal-leading-zero);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .status-banner {
      background: rgba(234,179,8,0.08);
      border: 1px solid rgba(234,179,8,0.25);
      border-left: 3px solid var(--wip);
      border-radius: 0 8px 8px 0;
      padding: 12px 18px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    /* vis.js topology */
    .topo-container {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .topo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .topo-header-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .topo-header-info b { color: var(--text); font-weight: 600; }
    .topo-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .topo-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      cursor: pointer;
      transition: all 150ms;
      white-space: nowrap;
    }
    .topo-btn:hover { border-color: var(--border2); color: var(--text); }
    .topo-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,255,176,0.08); }
    #vis-canvas {
      width: 100%;
      height: 560px;
      background: var(--bg);
    }
    .topo-container.fullscreen {
      position: fixed;
      inset: 0;
      z-index: 500;
      border-radius: 0;
      margin: 0;
    }
    .topo-container.fullscreen #vis-canvas { height: calc(100vh - 50px); }
    .topo-legend {
      display: flex;
      gap: 14px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .topo-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .topo-legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="nav"></div>
  <div class="breadcrumb"><a href="index.html">Dashboard</a><span class="sep">›</span><span>Netzwerk-Plan</span></div>

  <header>
    <div class="header-left">
      <h1>// netz<span>_plan</span></h1>
      <p id="net-subtitle">Lade...</p>
    </div>
    <button id="btn-export-network" style="font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;transition:all 150ms;white-space:nowrap" onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--border2)'" onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border)'">↓ Export Network JSON</button>
  </header>

  <div id="status-banner" class="status-banner" style="display:none"></div>

  <!-- Teil A: Interaktive Netzwerk-Topologie -->
  <div class="section-label">Netzwerk-Topologie</div>
  <div class="topo-container" id="topo-container">
    <div class="topo-header">
      <span class="topo-header-info" id="topo-info">Lade...</span>
      <div class="topo-controls">
        <button class="topo-btn" id="btn-migration" title="Migrations-Linien einblenden">⇄ Migration</button>
        <button class="topo-btn" id="btn-fullscreen" title="Fullscreen umschalten">⛶ Fullscreen</button>
      </div>
    </div>
    <div id="vis-canvas"></div>
    <div class="topo-legend">
      <span class="topo-legend-item"><span class="topo-legend-dot" style="background:#22c55e"></span> aktiv</span>
      <span class="topo-legend-item"><span class="topo-legend-dot" style="background:#5a6278"></span> geplant</span>
      <span class="topo-legend-item"><span class="topo-legend-dot" style="background:#00d4aa"></span> MGMT</span>
      <span class="topo-legend-item"><span class="topo-legend-dot" style="background:#4db8ff"></span> SVC</span>
      <span class="topo-legend-item"><span class="topo-legend-dot" style="background:#a78bfa"></span> LAB</span>
      <span class="topo-legend-item"><span class="topo-legend-dot" style="background:#fb923c"></span> DMZ</span>
    </div>
  </div>

  <!-- Teil B: Subnetz-Details -->
  <div class="section-label">Subnetze</div>
  <div id="subnet-sections"></div>

  <!-- Firewall Rules -->
  <div class="section-label" style="margin-top:32px">Firewall-Regeln</div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px">
    <table class="net-table" id="firewall-table">
      <thead><tr><th>Von</th><th>Nach</th><th>Regel</th><th>Notiz</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Migration Mapping -->
  <div class="section-label">Migrations-Mapping</div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px">
    <table class="net-table" id="migration-table">
      <thead><tr><th>Aktuell</th><th>→</th><th>Ziel</th><th>Host</th><th>Status</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Design-Prinzipien -->
  <div class="section-label">Design-Prinzipien</div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px">
    <ol class="principles-list" id="principles-list"></ol>
  </div>

  <footer>homelab_roadmap · <span>netz_plan</span> · living document</footer>
</div>

<script src="assets/state.js"></script>
<script src="assets/network-state.js"></script>
<script src="assets/nav.js"></script>
<script>
(function() {
  'use strict';

  var COLOR_MAP = {
    teal:   { fill: 'rgba(0,212,170,0.12)', stroke: '#00d4aa', text: '#00d4aa', bg: '#00d4aa' },
    blue:   { fill: 'rgba(77,184,255,0.12)', stroke: '#4db8ff', text: '#4db8ff', bg: '#4db8ff' },
    purple: { fill: 'rgba(167,139,250,0.12)', stroke: '#a78bfa', text: '#a78bfa', bg: '#a78bfa' },
    amber:  { fill: 'rgba(251,146,60,0.12)',  stroke: '#fb923c', text: '#fb923c', bg: '#fb923c' }
  };

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  var visNetwork = null;
  var migrationEdges = [];
  var migrationVisible = false;

  function init() {
    if (!window.NETWORK) return;
    var N = window.NETWORK;

    // Subtitle
    var totalHosts = 0;
    var activeHosts = 0;
    N.subnets.forEach(function(sn) {
      (sn.hosts || []).forEach(function(h) {
        totalHosts++;
        if (h.status === 'active') activeHosts++;
      });
    });
    document.getElementById('net-subtitle').textContent =
      N.subnets.length + ' Subnetze · ' + activeHosts + ' aktive Hosts · ' + totalHosts + ' geplant';

    // Status banner
    if (N.meta.status) {
      var banner = document.getElementById('status-banner');
      banner.style.display = '';
      banner.textContent = '⚡ ' + N.meta.status;
    }

    // Topo header info
    var visibleHosts = 0;
    N.subnets.forEach(function(sn) {
      (sn.hosts || []).forEach(function(h) {
        if (h.status !== 'reserved' && !h.ip.includes('–') && h.name.indexOf('Reserve') === -1) visibleHosts++;
      });
    });
    document.getElementById('topo-info').innerHTML =
      '<b>Netzwerk-Topologie</b> · ' + N.subnets.length + ' Subnetze · ' + visibleHosts + ' Hosts';

    renderVisTopology(N);
    renderSubnetSections(N);
    renderFirewall(N);
    renderMigration(N);
    renderPrinciples(N);
    bindTopoControls(N);
    bindExportNetwork();
  }

  function bindExportNetwork() {
    document.getElementById('btn-export-network').addEventListener('click', function() {
      if (!window.NETWORK) return;
      var payload = {
        meta: Object.assign({}, window.NETWORK.meta || {}, { updated: new Date().toISOString().split('T')[0] }),
        subnets: window.NETWORK.subnets,
        firewall_rules: window.NETWORK.firewall_rules,
        migration: window.NETWORK.migration,
        principles: window.NETWORK.principles
      };
      var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'homelab-network.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }

  /* ============================= */
  /* vis.js Interactive Topology    */
  /* ============================= */
  function renderVisTopology(N) {
    var nodes = [];
    var edges = [];
    var nodeId = 1;
    var subnetNodeMap = {}; // subnet id -> node id
    var hostNodeMap = {};   // host unique key -> { nodeId, host, subnet }

    // Internet node
    var internetId = nodeId++;
    nodes.push({
      id: internetId,
      label: '☁  Internet',
      shape: 'ellipse',
      color: { background: '#1a1e29', border: '#5a6278', highlight: { background: '#1a1e29', border: '#8890a4' } },
      font: { color: '#5a6278', size: 12, face: "'JetBrains Mono', monospace" },
      borderWidth: 1.5,
      level: 0
    });

    // OPNsense node
    var opnsenseId = nodeId++;
    nodes.push({
      id: opnsenseId,
      label: 'OPNsense\nGateway / Firewall',
      shape: 'box',
      color: { background: '#1a1e29', border: '#4fffb0', highlight: { background: '#1a1e29', border: '#4fffb0' } },
      font: { color: '#4fffb0', size: 11, face: "'JetBrains Mono', monospace", multi: true },
      borderWidth: 2,
      level: 1
    });

    // TP-Link (transition)
    var tplinkId = nodeId++;
    nodes.push({
      id: tplinkId,
      label: 'TP-Link Router\n(Übergang)',
      shape: 'box',
      color: { background: '#13161e', border: '#3a4055', highlight: { background: '#13161e', border: '#3a4055' } },
      font: { color: '#5a6278', size: 10, face: "'JetBrains Mono', monospace", multi: true },
      borderWidth: 1,
      shapeProperties: { borderDashes: [6, 3] },
      level: 1
    });

    // Internet edges
    edges.push({
      from: internetId, to: opnsenseId,
      color: { color: '#3a4055', highlight: '#5a6278' },
      dashes: false, width: 1.5, arrows: { to: { enabled: true, scaleFactor: 0.6 }, from: { enabled: true, scaleFactor: 0.6 } }
    });
    edges.push({
      from: internetId, to: tplinkId,
      color: { color: '#2a2f3f', highlight: '#3a4055' },
      dashes: [6, 3], width: 1, arrows: { to: { enabled: true, scaleFactor: 0.5 } },
      label: 'aktuell', font: { color: '#5a6278', size: 8, face: "'JetBrains Mono', monospace", strokeWidth: 0 }
    });

    // Subnet + Host nodes
    N.subnets.forEach(function(sn) {
      var c = COLOR_MAP[sn.color] || COLOR_MAP.teal;
      var snId = nodeId++;
      subnetNodeMap[sn.id] = snId;

      nodes.push({
        id: snId,
        label: sn.name.toUpperCase() + '\n' + sn.cidr,
        shape: 'box',
        color: { background: c.fill, border: c.stroke, highlight: { background: c.fill, border: c.text } },
        font: { color: c.text, size: 11, face: "'JetBrains Mono', monospace", multi: true, bold: { color: c.text } },
        borderWidth: 2,
        level: 2,
        margin: 10,
        _subnetId: sn.id
      });

      // OPNsense -> Subnet edge
      edges.push({
        from: opnsenseId, to: snId,
        color: { color: c.stroke, opacity: 0.5, highlight: c.text },
        width: 1.5,
        arrows: { to: { enabled: true, scaleFactor: 0.5 } }
      });

      // Host nodes (skip reserved + range entries)
      (sn.hosts || []).forEach(function(h) {
        if (h.status === 'reserved') return;
        if (h.ip.includes('–')) return;
        if (h.name.indexOf('Reserve') !== -1 && h.name.indexOf('—') !== -1) return;

        var hId = nodeId++;
        var isActive = h.status === 'active';
        var isCore = h.core === true;
        var hostColor = isActive ? '#22c55e' : '#5a6278';
        var bgColor = isActive ? 'rgba(34,197,94,0.12)' : 'rgba(90,98,120,0.08)';
        var borderW = isCore ? 3 : 1.5;
        var fullIp = sn.cidr.replace(/\.\d+\/\d+$/, '') + h.ip.replace(/^\./, '.');

        var tooltip = '<b>' + esc(h.name) + '</b><br>IP: ' + esc(fullIp) +
          '<br>Rolle: ' + esc(h.role) +
          '<br>Status: ' + esc(h.status || 'planned');
        if (h.current_ip) tooltip += '<br>Aktuelle IP: ' + esc(h.current_ip);
        if (h.core) tooltip += '<br><i>Core-Infrastruktur</i>';

        nodes.push({
          id: hId,
          label: h.name + '\n' + fullIp,
          shape: 'box',
          color: { background: bgColor, border: hostColor, highlight: { background: bgColor, border: c.text } },
          font: { color: isActive ? '#c8cedd' : '#5a6278', size: 9, face: "'JetBrains Mono', monospace", multi: true },
          borderWidth: borderW,
          level: 3,
          title: tooltip,
          _stepId: h.step_id || null,
          _ideaId: h.idea_id || null,
          _subnetId: sn.id,
          _currentIp: h.current_ip || null,
          _targetIp: fullIp
        });

        edges.push({
          from: snId, to: hId,
          color: { color: c.stroke, opacity: 0.25, highlight: c.text },
          width: 1
        });

        hostNodeMap[sn.id + ':' + h.ip] = { nodeId: hId, host: h, subnet: sn };
      });
    });

    // Firewall rule edges (between subnet groups)
    var SUBNET_ALIAS = { MGMT: 'mgmt', SVC: 'svc', LAB: 'lab', DMZ: 'dmz' };
    (N.firewall_rules || []).forEach(function(r) {
      var fromKey = SUBNET_ALIAS[r.from.toUpperCase()];
      var toKey = SUBNET_ALIAS[r.to.toUpperCase()];
      // Only draw edges between known subnets
      if (fromKey && subnetNodeMap[fromKey] && toKey && subnetNodeMap[toKey]) {
        var edgeColor = '#22c55e';
        var label = 'erlaubt';
        if (r.rule.indexOf('GEBLOCKT') !== -1) { edgeColor = '#ef4444'; label = 'geblockt'; }
        else if (r.rule.indexOf('nur') !== -1 || r.rule.indexOf('Port') !== -1) {
          edgeColor = '#eab308';
          label = r.rule.replace(/^nur\s*/i, '').substring(0, 18);
        }
        edges.push({
          from: subnetNodeMap[fromKey], to: subnetNodeMap[toKey],
          color: { color: edgeColor, opacity: 0.6, highlight: edgeColor },
          dashes: r.rule.indexOf('GEBLOCKT') !== -1 ? [8, 4] : false,
          width: 1,
          arrows: { to: { enabled: true, scaleFactor: 0.5 } },
          label: label,
          font: { color: edgeColor, size: 8, face: "'JetBrains Mono', monospace", strokeWidth: 0, background: 'transparent' },
          smooth: { type: 'curvedCW', roundness: 0.2 }
        });
      }
    });

    // Prepare migration edges (hidden initially)
    (N.migration || []).forEach(function(m) {
      if (m.status === 'no-change') return;
      // Find the target host node
      for (var key in hostNodeMap) {
        var entry = hostNodeMap[key];
        if (entry.host.current_ip === m.current) {
          migrationEdges.push({
            from: tplinkId, to: entry.nodeId,
            color: { color: '#eab308', opacity: 0.6 },
            dashes: [4, 4],
            width: 1.5,
            label: m.current + ' → ' + m.target,
            font: { color: '#eab308', size: 8, face: "'JetBrains Mono', monospace", strokeWidth: 0 },
            arrows: { to: { enabled: true, scaleFactor: 0.5 } },
            hidden: true,
            _migration: true
          });
          break;
        }
      }
    });

    var allEdges = edges.concat(migrationEdges);

    var container = document.getElementById('vis-canvas');
    var data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(allEdges) };

    var options = {
      layout: {
        hierarchical: {
          direction: 'UD',
          sortMethod: 'directed',
          levelSeparation: 120,
          nodeSpacing: 100,
          treeSpacing: 80
        }
      },
      nodes: {
        margin: { top: 8, bottom: 8, left: 10, right: 10 },
        shadow: false
      },
      edges: {
        smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 },
        font: { align: 'middle' }
      },
      physics: false,
      interaction: {
        hover: true,
        tooltipDelay: 150,
        zoomView: true,
        dragView: true,
        navigationButtons: false,
        keyboard: false
      }
    };

    visNetwork = new vis.Network(container, data, options);

    // Click handler
    visNetwork.on('click', function(params) {
      if (params.nodes.length === 0) return;
      var clickedId = params.nodes[0];
      var node = data.nodes.get(clickedId);
      if (!node) return;

      // Subnet click -> scroll to detail
      if (node._subnetId && node.level === 2) {
        var el = document.getElementById('subnet-' + node._subnetId);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          el.classList.add('open');
          var toggle = el.querySelector('.subnet-toggle');
          if (toggle) toggle.textContent = '▴';
        }
        return;
      }

      // Host click -> link to step or idea
      if (node._stepId) {
        window.location.href = 'steps/step.html?id=' + encodeURIComponent(node._stepId);
      } else if (node._ideaId) {
        window.location.href = 'ideas.html?highlight=' + encodeURIComponent(node._ideaId);
      }
    });

    // Store edges dataset for migration toggle
    visNetwork._edgesDataset = data.edges;
  }

  /* =================== */
  /* Topo controls         */
  /* =================== */
  function bindTopoControls(N) {
    // Fullscreen toggle
    document.getElementById('btn-fullscreen').addEventListener('click', function() {
      var c = document.getElementById('topo-container');
      c.classList.toggle('fullscreen');
      this.classList.toggle('active');
      this.textContent = c.classList.contains('fullscreen') ? '⛶ Exit' : '⛶ Fullscreen';
      if (visNetwork) setTimeout(function() { visNetwork.fit(); }, 100);
    });

    // Escape to exit fullscreen
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var c = document.getElementById('topo-container');
        if (c.classList.contains('fullscreen')) {
          c.classList.remove('fullscreen');
          document.getElementById('btn-fullscreen').classList.remove('active');
          document.getElementById('btn-fullscreen').textContent = '⛶ Fullscreen';
          if (visNetwork) setTimeout(function() { visNetwork.fit(); }, 100);
        }
      }
    });

    // Migration toggle
    document.getElementById('btn-migration').addEventListener('click', function() {
      migrationVisible = !migrationVisible;
      this.classList.toggle('active', migrationVisible);
      if (visNetwork && visNetwork._edgesDataset) {
        var edgeIds = visNetwork._edgesDataset.getIds();
        edgeIds.forEach(function(eid) {
          var edge = visNetwork._edgesDataset.get(eid);
          if (edge._migration) {
            visNetwork._edgesDataset.update({ id: eid, hidden: !migrationVisible });
          }
        });
      }
    });
  }

  /* ============================== */
  /* Teil B: Subnetz-Detail-Sektionen */
  /* ============================== */
  function renderSubnetSections(N) {
    var container = document.getElementById('subnet-sections');
    var html = '';

    N.subnets.forEach(function(sn) {
      var c = COLOR_MAP[sn.color] || COLOR_MAP.teal;
      var hostCount = (sn.hosts || []).filter(function(h) { return !h.ip.includes('–') && h.name.indexOf('Reserve') === -1; }).length;
      var activeCount = (sn.hosts || []).filter(function(h) { return h.status === 'active'; }).length;

      html += '<div class="subnet-section" id="subnet-' + sn.id + '" data-id="' + sn.id + '">';
      html += '<div class="subnet-header">';
      html += '<span class="subnet-badge" style="background:' + c.fill + ';color:' + c.text + ';border:1px solid ' + c.stroke + '">' + esc(sn.name.toUpperCase()) + '</span>';
      html += '<div class="subnet-info">';
      html += '<div class="subnet-title">' + esc(sn.name) + ' — ' + esc(sn.cidr) + '</div>';
      html += '<div class="subnet-meta">GW: ' + esc(sn.gateway) + ' · ' + activeCount + '/' + hostCount + ' aktiv · ' + esc(sn.purpose) + '</div>';
      html += '</div>';
      html += '<span class="subnet-toggle">▾</span>';
      html += '</div>';

      // Body
      html += '<div class="subnet-body"><div class="subnet-body-inner">';

      // Purpose
      html += '<div style="font-size:12px;color:var(--muted);margin-bottom:14px;font-style:italic">' + esc(sn.purpose) + '</div>';

      // DHCP range
      if (sn.dhcp_range) {
        html += '<div class="dhcp-info">DHCP-Range: ' + esc(sn.dhcp_range) + '</div>';
      }

      // IP table
      html += '<table class="ip-table"><thead><tr><th>IP</th><th>Host</th><th>Rolle</th><th>Status</th><th></th></tr></thead><tbody>';
      (sn.hosts || []).forEach(function(h) {
        var statusClass = h.status || 'planned';
        var ideaLink = '';
        if (h.idea_id) {
          ideaLink = '<a href="ideas.html?highlight=' + encodeURIComponent(h.idea_id) + '" class="idea-link" title="Idee anzeigen">💡 ' + esc(h.idea_id) + '</a>';
        }
        if (h.step_id) {
          ideaLink = '<a href="steps/step.html?id=' + encodeURIComponent(h.step_id) + '" class="idea-link" title="Step anzeigen">📋 ' + esc(h.step_id) + '</a>';
        }
        html += '<tr>';
        html += '<td class="ip-col">' + esc(sn.cidr.replace(/\.\d+\/\d+$/, '') + h.ip.replace(/^\./, '.')) + '</td>';
        html += '<td>' + esc(h.name) + (h.core ? ' <span style="font-size:9px;color:var(--accent);font-family:\'JetBrains Mono\',monospace">CORE</span>' : '') + '</td>';
        html += '<td style="font-size:11px;color:var(--muted)">' + esc(h.role) + '</td>';
        html += '<td><span class="status-dot ' + statusClass + '"></span>' + esc(h.status || 'planned') + '</td>';
        html += '<td>' + ideaLink + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';

      html += '</div></div>'; // body-inner, body
      html += '</div>'; // subnet-section
    });

    container.innerHTML = html;

    // Bind click to toggle
    container.querySelectorAll('.subnet-header').forEach(function(header) {
      header.addEventListener('click', function() {
        var section = header.closest('.subnet-section');
        section.classList.toggle('open');
        var toggle = section.querySelector('.subnet-toggle');
        toggle.textContent = section.classList.contains('open') ? '▴' : '▾';
      });
    });
  }

  /* ================ */
  /* Firewall-Regeln   */
  /* ================ */
  function renderFirewall(N) {
    var tbody = document.querySelector('#firewall-table tbody');
    var html = '';
    (N.firewall_rules || []).forEach(function(r) {
      var ruleText = esc(r.rule);
      var ruleClass = '';
      if (r.rule.indexOf('ERLAUBT') !== -1) ruleClass = 'rule-allow';
      else if (r.rule.indexOf('GEBLOCKT') !== -1) ruleClass = 'rule-block';
      else ruleClass = 'rule-partial';

      html += '<tr>';
      html += '<td class="mono">' + esc(r.from) + '</td>';
      html += '<td class="mono">' + esc(r.to) + '</td>';
      html += '<td class="mono ' + ruleClass + '">' + ruleText + '</td>';
      html += '<td style="font-size:11px;color:var(--muted)">' + esc(r.note || '') + '</td>';
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  /* =================== */
  /* Migrations-Mapping   */
  /* =================== */
  function renderMigration(N) {
    var tbody = document.querySelector('#migration-table tbody');
    var html = '';
    (N.migration || []).forEach(function(m) {
      var statusClass = 'migration-pending';
      var statusLabel = m.status || 'pending';
      if (statusLabel === 'done') statusClass = 'migration-done';
      else if (statusLabel === 'no-change') { statusClass = 'migration-nochange'; statusLabel = 'bleibt'; }

      html += '<tr>';
      html += '<td class="mono">' + esc(m.current) + '</td>';
      html += '<td style="text-align:center;color:var(--muted)">→</td>';
      html += '<td class="mono">' + esc(m.target) + '</td>';
      html += '<td>' + esc(m.host) + '</td>';
      html += '<td class="mono ' + statusClass + '">' + esc(statusLabel) + '</td>';
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  /* =================== */
  /* Design-Prinzipien    */
  /* =================== */
  function renderPrinciples(N) {
    var list = document.getElementById('principles-list');
    var html = '';
    (N.principles || []).forEach(function(p) {
      html += '<li>' + esc(p) + '</li>';
    });
    list.innerHTML = html;
  }

  window.addEventListener('network-ready', init);
})();
</script>
</body>
</html>
